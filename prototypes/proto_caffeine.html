<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>카페인 분석 실험 - 도형 프로토타입</title>
<style>
  :root{
    --bg:#14181d;
    --panel:#1e242b;
    --panel2:#262e37;
    --line:#3a4552;
    --fg:#eef1f5;
    --fg-dim:#9aa7b4;
    --accent:#ffb703;
    --good:#5ce65c;
    --warn:#ffcf3f;
    --bad:#ff5c5c;
    --cola:#3a2317;
    --coffee:#8a5a2e;
    --energy:#8fef2a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
    word-break:keep-all; overflow-wrap:break-word;
    line-height:1.6;
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
  }
  #app{
    max-width:480px; margin:0 auto; min-height:100vh;
    display:flex; flex-direction:column;
    padding:16px 16px 32px;
  }
  header{ text-align:center; padding:10px 0 6px; }
  header h1{ font-size:clamp(18px,5vw,22px); margin:0 0 4px; letter-spacing:-0.02em; }
  header p{ margin:0; font-size:13px; color:var(--fg-dim); }

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px;
    margin-top:14px;
  }
  .btn{
    display:inline-flex; align-items:center; justify-content:center;
    gap:8px;
    background:var(--accent); color:#1a1300;
    border:none; border-radius:10px;
    font-size:15px; font-weight:700;
    padding:13px 20px;
    cursor:pointer;
    min-height:46px;
    width:100%;
    transition:transform .08s ease, filter .15s ease, opacity .15s ease;
  }
  .btn:active{ transform:scale(.97); filter:brightness(.92); }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .btn.secondary{ background:var(--panel2); color:var(--fg); border:1px solid var(--line); }
  .btn.small{ width:auto; padding:9px 14px; font-size:13px; }
  .row{ display:flex; gap:10px; }
  .row > *{ flex:1; }

  /* -------- 인트로 -------- */
  .intro-diagram{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin:18px 0;
  }
  .intro-shape{ width:34px; height:34px; border-radius:8px; }
  .intro-arrow{ color:var(--fg-dim); font-size:18px; }

  /* -------- 샘플 선택 -------- */
  .sample-grid{ display:flex; flex-direction:column; gap:12px; margin-top:14px; }
  .sample-card{
    display:flex; align-items:center; gap:14px;
    background:var(--panel2); border:1px solid var(--line);
    border-radius:12px; padding:14px;
    cursor:pointer;
    transition:transform .08s ease, border-color .15s ease;
  }
  .sample-card:active{ transform:scale(.98); }
  .sample-card.done{ border-color:var(--good); }
  .sample-card.disabled{ cursor:default; }
  .sample-swatch{
    width:46px; height:46px; border-radius:50%;
    flex-shrink:0; border:2px solid rgba(255,255,255,.15);
  }
  .sample-info{ flex:1; min-width:0; }
  .sample-name{ font-weight:700; font-size:16px; }
  .sample-status{ font-size:12.5px; color:var(--fg-dim); margin-top:2px; }
  .sample-status.done{ color:var(--good); }
  .sample-check{
    width:26px; height:26px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:900; flex-shrink:0;
  }
  .sample-check.empty{ border:2px dashed var(--line); color:transparent; }
  .sample-check.done{ background:var(--good); color:#06210a; }

  /* -------- 측정 화면 -------- */
  .device{
    position:relative;
    background:var(--panel2);
    border:1px solid var(--line);
    border-radius:12px;
    height:120px;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:16px;
    overflow:hidden;
  }
  .device-slot{
    width:60px; height:74px;
    border:2px dashed var(--line);
    border-radius:6px;
    display:flex; align-items:flex-end; justify-content:center;
    overflow:hidden;
  }
  .device-cuvette{
    width:0%; height:0%;
    border-radius:3px;
    transition:width .45s cubic-bezier(.34,1.4,.4,1), height .45s cubic-bezier(.34,1.4,.4,1);
  }
  .device-cuvette.filled{ width:70%; height:88%; }
  .light-beam{
    position:absolute; left:0; top:50%; transform:translateY(-50%);
    width:0; height:4px; background:var(--accent);
    box-shadow:0 0 10px var(--accent);
    opacity:0;
  }
  .light-beam.on{ animation:beamSweep 1.1s ease-in-out; }
  @keyframes beamSweep{
    0%{ width:0; opacity:0; }
    15%{ opacity:1; }
    70%{ width:100%; opacity:1; }
    100%{ width:100%; opacity:0; }
  }

  .step-label{
    font-size:12.5px; color:var(--fg-dim);
    text-transform:uppercase; letter-spacing:.04em;
    margin-bottom:6px;
  }
  .step-title{ font-size:16px; font-weight:700; margin-bottom:14px; }

  /* 다이얼(타이밍) 미니게임 */
  .dial-wrap{ margin:6px 0 16px; }
  .dial-track{
    position:relative;
    height:34px;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:8px;
    margin-bottom:14px;
    overflow:hidden;
  }
  .dial-target{
    position:absolute; top:0; bottom:0;
    background:rgba(92,230,92,.28);
    border-left:2px solid var(--good);
    border-right:2px solid var(--good);
  }
  .dial-marker{
    position:absolute; top:-3px;
    width:4px; height:40px;
    background:var(--accent);
    border-radius:2px;
    box-shadow:0 0 8px var(--accent);
    transform:translateX(-50%);
  }
  .dial-hint{ font-size:12px; color:var(--fg-dim); text-align:center; margin-bottom:10px; }

  /* 결과 모달 */
  .result-pop{
    text-align:center; padding:6px 0 2px;
  }
  .result-pop .big-num{
    font-size:38px; font-weight:900; margin:6px 0;
  }
  .result-pop .tag{
    display:inline-block; padding:4px 12px; border-radius:20px;
    font-size:13px; font-weight:700; margin-bottom:4px;
  }
  .tag.good{ background:rgba(92,230,92,.18); color:var(--good); }
  .tag.warn{ background:rgba(255,207,63,.18); color:var(--warn); }
  .tag.bad{ background:rgba(255,92,92,.18); color:var(--bad); }
  .pop-anim{ animation:popIn .35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes popIn{ 0%{ transform:scale(.7); opacity:0;} 100%{ transform:scale(1); opacity:1;} }
  .shake{ animation:shakeAnim .35s ease; }
  @keyframes shakeAnim{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-6px); }
    40%{ transform:translateX(5px); }
    60%{ transform:translateX(-3px); }
    80%{ transform:translateX(2px); }
  }

  /* -------- 결과 그래프 -------- */
  .graph{
    display:flex; align-items:flex-end; justify-content:space-around;
    height:180px; margin:18px 0 6px;
    border-bottom:2px solid var(--line);
    padding:0 6px;
    gap:14px;
  }
  .bar-col{ display:flex; flex-direction:column; align-items:center; flex:1; height:100%; justify-content:flex-end; }
  .bar-val{ font-size:12.5px; font-weight:700; margin-bottom:6px; opacity:0; transition:opacity .3s ease; }
  .bar-val.show{ opacity:1; }
  .bar{
    width:100%; max-width:56px;
    border-radius:6px 6px 0 0;
    height:0%;
    transition:height 1s cubic-bezier(.22,.9,.3,1.2);
    border:2px solid transparent;
  }
  .bar.correct{ border-color:var(--good); }
  .bar.wrong{ border-color:var(--bad); }
  .bar-label{ font-size:12px; color:var(--fg-dim); margin-top:8px; text-align:center; }

  .rank-instruction{ font-size:14px; margin:18px 0 10px; text-align:center; }
  .rank-row{ display:flex; gap:10px; }
  .rank-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;
    background:var(--panel2); border:2px solid var(--line);
    border-radius:12px; padding:14px 6px;
    cursor:pointer; position:relative;
    transition:transform .08s ease, border-color .15s ease, opacity .2s ease;
  }
  .rank-btn:active{ transform:scale(.96); }
  .rank-btn:disabled{ opacity:.5; cursor:default; }
  .rank-swatch{ width:32px; height:32px; border-radius:50%; border:2px solid rgba(255,255,255,.15); }
  .rank-name{ font-size:13px; font-weight:600; }
  .rank-badge{
    position:absolute; top:-8px; right:-8px;
    width:24px; height:24px; border-radius:50%;
    background:var(--accent); color:#1a1300;
    font-size:13px; font-weight:900;
    display:flex; align-items:center; justify-content:center;
  }

  .final-score{ text-align:center; padding:8px 0; }
  .final-score .grade{ font-size:56px; font-weight:900; line-height:1; margin:10px 0; }
  .final-score .num{ font-size:16px; color:var(--fg-dim); }
  .breakdown{ margin-top:16px; font-size:13.5px; color:var(--fg-dim); text-align:left; }
  .breakdown div{ display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px dashed var(--line); }
  .breakdown div span:last-child{ color:var(--fg); font-weight:700; }

  .confetti-layer{
    position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50;
  }
  .confetti-piece{
    position:absolute; top:-20px;
    width:8px; height:8px;
    animation:fall 1.4s ease-in forwards;
  }
  @keyframes fall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(420px) rotate(540deg); opacity:0; }
  }

  .progress-dots{ display:flex; justify-content:center; gap:8px; margin:14px 0 2px; }
  .progress-dots span{ width:8px; height:8px; border-radius:50%; background:var(--line); }
  .progress-dots span.on{ background:var(--accent); }

  .true-order{ font-size:13px; color:var(--fg-dim); text-align:center; margin-top:14px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  var SAMPLES = [
    { id:"cola",   name:"콜라(355ml)",     color:"#3a2317", trueValue:32,  speed:1.15, targetW:22 },
    { id:"coffee", name:"드립커피(240ml)", color:"#8a5a2e", trueValue:95,  speed:1.55, targetW:17 },
    { id:"energy", name:"에너지음료(250ml)", color:"#8fef2a", trueValue:160, speed:2.0,  targetW:13 }
  ];

  var state = {
    screen: "intro",      // intro | select | measure | result | final
    measureSub: "insert",  // insert | measuring | done
    currentId: null,
    rankOrder: []
  };

  var rafId = null;
  var dialData = null; // {startTime, speed, targetStart, targetW, running}

  function getSample(id){
    for (var i=0;i<SAMPLES.length;i++){ if (SAMPLES[i].id===id) return SAMPLES[i]; }
    return null;
  }
  function allMeasured(){
    return SAMPLES.every(function(s){ return s.measured != null; });
  }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function esc(s){ return String(s); }

  function app(){ return document.getElementById("app"); }

  function render(){
    stopDialLoop();
    var el = app();
    if (state.screen === "intro") el.innerHTML = renderIntro();
    else if (state.screen === "select") el.innerHTML = renderSelect();
    else if (state.screen === "measure") el.innerHTML = renderMeasure();
    else if (state.screen === "result") el.innerHTML = renderResult();
    else if (state.screen === "final") el.innerHTML = renderFinal();
    bindEvents();
    if (state.screen === "measure" && state.measureSub === "measuring") startDialLoop();
    if (state.screen === "result") requestAnimationFrame(animateBars);
  }

  /* ---------------- 인트로 ---------------- */
  function renderIntro(){
    return ''
    + '<header><h1>카페인 분석 실험</h1><p>2교육실 화학 · 일상실험실 연계 프로토타입</p></header>'
    + '<div class="card">'
    + '  <div class="step-label">실험 목표</div>'
    + '  <div class="step-title">분광광도계로 음료 3종의 카페인 농도를 측정하고,<br>낮은 순서대로 정렬하라</div>'
    + '  <div class="intro-diagram">'
    + '    <div class="intro-shape" style="background:'+SAMPLES[0].color+'"></div>'
    + '    <span class="intro-arrow">→</span>'
    + '    <div class="intro-shape" style="background:#2b3138;border:1px solid var(--line);border-radius:4px;"></div>'
    + '    <span class="intro-arrow">→</span>'
    + '    <div class="intro-shape" style="background:var(--accent);border-radius:4px;width:14px;"></div>'
    + '    <span class="intro-arrow">→</span>'
    + '    <div class="intro-shape" style="background:var(--panel2);border:1px solid var(--line);border-radius:4px 4px 0 0;height:22px;align-self:flex-end;"></div>'
    + '  </div>'
    + '  <button class="btn" id="btnStart">실험 시작</button>'
    + '</div>';
  }

  /* ---------------- 샘플 선택 ---------------- */
  function renderSelect(){
    var doneCount = SAMPLES.filter(function(s){return s.measured!=null;}).length;
    var cards = SAMPLES.map(function(s){
      var done = s.measured != null;
      return ''
      + '<div class="sample-card '+(done?'done':'')+'" data-id="'+s.id+'">'
      + '  <div class="sample-swatch" style="background:'+s.color+'"></div>'
      + '  <div class="sample-info">'
      + '    <div class="sample-name">'+esc(s.name)+'</div>'
      + '    <div class="sample-status '+(done?'done':'')+'">'+(done ? '측정 완료 · 정확도 '+s.accuracy+'%' : '미측정')+'</div>'
      + '  </div>'
      + '  <div class="sample-check '+(done?'done':'empty')+'">✓</div>'
      + '</div>';
    }).join('');

    return ''
    + '<header><h1>샘플 선택</h1><p>순서대로 3개 음료를 모두 측정하세요 ('+doneCount+'/3)</p></header>'
    + '<div class="progress-dots">' + SAMPLES.map(function(s){return '<span class="'+(s.measured!=null?'on':'')+'"></span>';}).join('') + '</div>'
    + '<div class="sample-grid">' + cards + '</div>'
    + '<button class="btn" id="btnToResult" style="margin-top:18px;" '+(allMeasured()?'':'disabled')+'>결과 보기</button>';
  }

  /* ---------------- 측정 화면 ---------------- */
  function renderMeasure(){
    var s = getSample(state.currentId);
    var body = "";

    if (state.measureSub === "insert"){
      body = ''
      + '<div class="step-label">1단계</div>'
      + '<div class="step-title">'+esc(s.name)+' 샘플을 분광광도계에 넣기</div>'
      + '<div class="device">'
      + '  <div class="light-beam" id="beam"></div>'
      + '  <div class="device-slot"><div class="device-cuvette" id="cuvette" style="background:'+s.color+'"></div></div>'
      + '</div>'
      + '<button class="btn" id="btnInsert">샘플 넣기</button>';
    } else if (state.measureSub === "measuring"){
      var s2 = s;
      body = ''
      + '<div class="step-label">2단계</div>'
      + '<div class="step-title">빛이 통과할 때, 흡광도 눈금이 초록 구간에 있을 때 정지!</div>'
      + '<div class="device">'
      + '  <div class="light-beam on" id="beam"></div>'
      + '  <div class="device-slot"><div class="device-cuvette filled" style="background:'+s2.color+'"></div></div>'
      + '</div>'
      + '<div class="dial-wrap">'
      + '  <div class="dial-hint">정지 버튼을 초록 구간에서 눌러야 정확도가 올라갑니다</div>'
      + '  <div class="dial-track" id="dialTrack">'
      + '    <div class="dial-target" id="dialTarget"></div>'
      + '    <div class="dial-marker" id="dialMarker"></div>'
      + '  </div>'
      + '</div>'
      + '<button class="btn" id="btnStop">정지! (측정)</button>';
    } else if (state.measureSub === "done"){
      var acc = s.accuracy;
      var tagClass = acc>=80 ? "good" : (acc>=50 ? "warn" : "bad");
      var tagText = acc>=80 ? "정확한 측정!" : (acc>=50 ? "쓸만한 측정" : "오차가 큽니다");
      body = ''
      + '<div class="card result-pop pop-anim" id="resultCard">'
      + '  <div class="tag '+tagClass+'">'+tagText+'</div>'
      + '  <div class="big-num">정확도 '+acc+'%</div>'
      + '  <div style="color:var(--fg-dim);font-size:13px;">'+esc(s.name)+' 흡광도 측정 완료 · 추정 카페인 '+s.measured.toFixed(1)+'mg</div>'
      + '</div>'
      + '<div class="confetti-layer" id="confettiHolder"></div>'
      + '<button class="btn" id="btnBackSelect" style="margin-top:16px;">선택 화면으로</button>';
    }

    return '<header><h1>'+ (s? esc(s.name) : '측정') +'</h1><p>실험 절차대로 진행하세요</p></header>' + '<div class="card">' + body + '</div>';
  }

  /* ---------------- 결과(그래프+랭킹) ---------------- */
  function renderResult(){
    var maxV = Math.max.apply(null, SAMPLES.map(function(s){ return s.measured; }));
    var bars = SAMPLES.map(function(s){
      return ''
      + '<div class="bar-col">'
      + '  <div class="bar-val" data-id="'+s.id+'">'+s.measured.toFixed(1)+'mg</div>'
      + '  <div class="bar" id="bar-'+s.id+'" data-target="'+ (s.measured/maxV*100) +'" style="background:'+s.color+'"></div>'
      + '  <div class="bar-label">'+esc(s.name.split('(')[0])+'</div>'
      + '</div>';
    }).join('');

    var rankBtns = SAMPLES.map(function(s){
      var idx = state.rankOrder.indexOf(s.id);
      var picked = idx>=0;
      return ''
      + '<button class="rank-btn" data-id="'+s.id+'" '+(picked?'disabled':'')+'>'
      + (picked ? '<span class="rank-badge">'+(idx+1)+'</span>' : '')
      + '  <div class="rank-swatch" style="background:'+s.color+'"></div>'
      + '  <div class="rank-name">'+esc(s.name.split('(')[0])+'</div>'
      + '</button>';
    }).join('');

    var evalBlock = "";
    if (state.rankOrder.length === 3){
      var correctOrder = SAMPLES.slice().sort(function(a,b){return a.trueValue-b.trueValue;}).map(function(s){return s.id;});
      var correctCount = 0;
      for (var i=0;i<3;i++){ if (state.rankOrder[i]===correctOrder[i]) correctCount++; }
      var perfect = correctCount===3;
      evalBlock = ''
      + '<div class="true-order">정답 순서: ' + correctOrder.map(function(id){return getSample(id).name.split('(')[0];}).join(' &lt; ') + '</div>'
      + '<button class="btn" id="btnToFinal" style="margin-top:16px;">점수 확인</button>';
    }

    return ''
    + '<header><h1>측정 결과</h1><p>막대 그래프로 카페인 농도를 비교하세요</p></header>'
    + '<div class="card">'
    + '  <div class="graph">' + bars + '</div>'
    + '  <div class="rank-instruction">카페인 함량이 <b>낮은 순서</b>대로 음료를 클릭하세요</div>'
    + '  <div class="rank-row">' + rankBtns + '</div>'
    + evalBlock
    + '</div>';
  }

  /* ---------------- 최종 점수 ---------------- */
  function renderFinal(){
    var avgAcc = SAMPLES.reduce(function(sum,s){return sum+s.accuracy;},0) / SAMPLES.length;
    var accuracyScore = Math.round(avgAcc*0.6);

    var correctOrder = SAMPLES.slice().sort(function(a,b){return a.trueValue-b.trueValue;}).map(function(s){return s.id;});
    var correctCount = 0;
    for (var i=0;i<3;i++){ if (state.rankOrder[i]===correctOrder[i]) correctCount++; }
    var rankScore = Math.round(correctCount/3*40);

    var total = accuracyScore + rankScore;
    var grade = total>=90 ? "S" : total>=75 ? "A" : total>=60 ? "B" : "C";

    return ''
    + '<header><h1>실험 완료</h1><p>측정 정확도 + 순위 정답으로 채점</p></header>'
    + '<div class="card final-score">'
    + '  <div class="num">종합 점수</div>'
    + '  <div class="grade" id="gradeText">'+grade+'</div>'
    + '  <div class="num">'+total+' / 100점</div>'
    + '  <div class="breakdown">'
    + '    <div><span>측정 정확도 평균</span><span>'+Math.round(avgAcc)+'% → '+accuracyScore+'/60점</span></div>'
    + '    <div><span>순위 정답 ('+correctCount+'/3 일치)</span><span>'+rankScore+'/40점</span></div>'
    + '  </div>'
    + '  <div class="confetti-layer" id="confettiHolder2"></div>'
    + '</div>'
    + '<button class="btn" id="btnRestart" style="margin-top:16px;">다시하기</button>';
  }

  /* ---------------- 이벤트 바인딩 ---------------- */
  function bindEvents(){
    var btnStart = document.getElementById("btnStart");
    if (btnStart) btnStart.addEventListener("click", function(){ state.screen="select"; render(); });

    var btnToResult = document.getElementById("btnToResult");
    if (btnToResult) btnToResult.addEventListener("click", function(){
      if (!allMeasured()) return;
      state.screen="result"; state.rankOrder=[]; render();
    });

    var cards = document.querySelectorAll(".sample-card");
    cards.forEach(function(c){
      c.addEventListener("click", function(){
        var id = c.getAttribute("data-id");
        var s = getSample(id);
        if (s.measured != null) return; // 이미 측정한 샘플은 재진입 안 함(짧은 플레이 유지)
        state.currentId = id;
        state.measureSub = "insert";
        state.screen = "measure";
        render();
      });
    });

    var btnInsert = document.getElementById("btnInsert");
    if (btnInsert) btnInsert.addEventListener("click", function(){
      var cuvette = document.getElementById("cuvette");
      btnInsert.disabled = true;
      cuvette.classList.add("filled");
      setTimeout(function(){
        state.measureSub = "measuring";
        render();
      }, 480);
    });

    var btnStop = document.getElementById("btnStop");
    if (btnStop) btnStop.addEventListener("click", onStopMeasurement);

    var dialTrack = document.getElementById("dialTrack");
    if (dialTrack) dialTrack.addEventListener("click", onStopMeasurement);

    var btnBackSelect = document.getElementById("btnBackSelect");
    if (btnBackSelect) btnBackSelect.addEventListener("click", function(){ state.screen="select"; render(); });

    var rankBtns = document.querySelectorAll(".rank-btn");
    rankBtns.forEach(function(b){
      b.addEventListener("click", function(){
        var id = b.getAttribute("data-id");
        if (state.rankOrder.indexOf(id) >= 0) return;
        if (state.rankOrder.length >= 3) return;
        state.rankOrder.push(id);
        render();
      });
    });

    var btnToFinal = document.getElementById("btnToFinal");
    if (btnToFinal) btnToFinal.addEventListener("click", function(){ state.screen="final"; render(); });

    var btnRestart = document.getElementById("btnRestart");
    if (btnRestart) btnRestart.addEventListener("click", function(){
      SAMPLES.forEach(function(s){ s.measured=null; s.accuracy=null; });
      state = { screen:"intro", measureSub:"insert", currentId:null, rankOrder:[] };
      render();
    });

    // 키보드(데스크톱) 스페이스바로 측정 정지
    document.onkeydown = function(e){
      if (e.code === "Space" && state.screen === "measure" && state.measureSub === "measuring"){
        e.preventDefault();
        onStopMeasurement();
      }
    };

    if (state.screen === "measure" && state.measureSub === "done"){
      var s = getSample(state.currentId);
      if (s.accuracy >= 60){
        spawnConfetti(document.getElementById("confettiHolder"), s.color, s.accuracy>=80?18:10);
      }
    }
    if (state.screen === "final"){
      var total = document.getElementById("gradeText").textContent;
      if (total === "S" || total === "A"){
        spawnConfetti(document.getElementById("confettiHolder2"), "var(--accent)", 26);
      }
    }
  }

  /* ---------------- 다이얼 미니게임 로직 ---------------- */
  function startDialLoop(){
    var s = getSample(state.currentId);
    var targetStart = 8 + Math.random() * (92 - s.targetW - 8);
    dialData = { startTime: performance.now(), speed: s.speed, targetStart: targetStart, targetW: s.targetW };

    var targetEl = document.getElementById("dialTarget");
    if (targetEl){
      targetEl.style.left = targetStart + "%";
      targetEl.style.width = s.targetW + "%";
    }

    function frame(now){
      if (!dialData) return;
      var elapsed = (now - dialData.startTime) / 1000;
      var pos = 50 + 48 * Math.sin(elapsed * dialData.speed * 1.6);
      dialData.currentPos = pos;
      var marker = document.getElementById("dialMarker");
      if (marker) marker.style.left = pos + "%";
      rafId = requestAnimationFrame(frame);
    }
    rafId = requestAnimationFrame(frame);
  }

  function stopDialLoop(){
    if (rafId){ cancelAnimationFrame(rafId); rafId = null; }
  }

  function onStopMeasurement(){
    if (!dialData) return;
    var s = getSample(state.currentId);
    var pos = dialData.currentPos != null ? dialData.currentPos : 50;
    var half = dialData.targetW / 2;
    var center = dialData.targetStart + half;
    var diff = Math.abs(pos - center);

    var accuracy;
    if (diff <= half) accuracy = 100;
    else accuracy = Math.round(clamp(100 - (diff - half) / 25 * 100, 0, 100));

    var noiseFactor = (100 - accuracy) / 100 * 0.35;
    var sign = Math.random() < 0.5 ? -1 : 1;
    var measured = s.trueValue * (1 + sign * noiseFactor);

    s.accuracy = accuracy;
    s.measured = Math.round(measured * 10) / 10;

    stopDialLoop();
    state.measureSub = "done";
    render();

    var card = document.getElementById("resultCard");
    if (card && accuracy < 50) card.classList.add("shake");
  }

  /* ---------------- 그래프 애니메이션 ---------------- */
  function animateBars(){
    var bars = document.querySelectorAll(".bar");
    bars.forEach(function(b){
      var t = parseFloat(b.getAttribute("data-target"));
      requestAnimationFrame(function(){ b.style.height = t + "%"; });
    });
    setTimeout(function(){
      document.querySelectorAll(".bar-val").forEach(function(v){ v.classList.add("show"); });
    }, 500);

    // 랭킹 3개 다 골랐으면 정답/오답 보더 표시
    if (state.rankOrder.length === 3){
      var correctOrder = SAMPLES.slice().sort(function(a,b){return a.trueValue-b.trueValue;}).map(function(s){return s.id;});
      SAMPLES.forEach(function(s){
        var idx = state.rankOrder.indexOf(s.id);
        var bar = document.getElementById("bar-"+s.id);
        if (!bar) return;
        if (correctOrder[idx] === s.id) bar.classList.add("correct");
        else bar.classList.add("wrong");
      });
    }
  }

  /* ---------------- 컨페티(도형 파티클) ---------------- */
  function spawnConfetti(holder, color, count){
    if (!holder) return;
    var colors = [color, "#ffb703", "#5ce65c", "#eef1f5"];
    for (var i=0;i<count;i++){
      var p = document.createElement("div");
      p.className = "confetti-piece";
      p.style.left = (10 + Math.random()*80) + "%";
      p.style.background = colors[i % colors.length];
      p.style.borderRadius = (Math.random()<0.5) ? "50%" : "2px";
      p.style.animationDelay = (Math.random()*0.2) + "s";
      p.style.animationDuration = (1.1 + Math.random()*0.6) + "s";
      holder.appendChild(p);
    }
    setTimeout(function(){ if (holder) holder.innerHTML = ""; }, 1800);
  }

  render();
})();
</script>
</body>
