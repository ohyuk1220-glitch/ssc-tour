<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>카페인 분석 실험 - 도형 프로토타입</title>
<style>
  :root{
    --bg:#14181d;
    --panel:#1e242b;
    --panel2:#262e37;
    --line:#3a4552;
    --fg:#eef1f5;
    --fg-dim:#9aa7b4;
    --accent:#ffb703;
    --good:#5ce65c;
    --warn:#ffcf3f;
    --bad:#ff5c5c;
    --cola:#3a2317;
    --coffee:#8a5a2e;
    --energy:#8fef2a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
    word-break:keep-all; overflow-wrap:break-word;
    line-height:1.6;
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
  }
  #app{
    max-width:480px; margin:0 auto; min-height:100vh;
    display:flex; flex-direction:column;
    padding:16px 16px 32px;
  }
  header{ text-align:center; padding:10px 0 6px; }
  header h1{ font-size:clamp(18px,5vw,22px); margin:0 0 4px; letter-spacing:-0.02em; }
  header p{ margin:0; font-size:13px; color:var(--fg-dim); }

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px;
    margin-top:14px;
  }
  .btn{
    display:inline-flex; align-items:center; justify-content:center;
    gap:8px;
    background:var(--accent); color:#1a1300;
    border:none; border-radius:10px;
    font-size:15px; font-weight:700;
    padding:13px 20px;
    cursor:pointer;
    min-height:46px;
    width:100%;
    transition:transform .08s ease, filter .15s ease, opacity .15s ease;
  }
  .btn:active{ transform:scale(.97); filter:brightness(.92); }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .btn.secondary{ background:var(--panel2); color:var(--fg); border:1px solid var(--line); }
  .btn.small{ width:auto; padding:9px 14px; font-size:13px; }
  .row{ display:flex; gap:10px; }
  .row > *{ flex:1; }

  /* -------- 인트로 -------- */
  .intro-diagram{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin:18px 0;
  }
  .intro-shape{ width:34px; height:34px; border-radius:8px; }
  .intro-arrow{ color:var(--fg-dim); font-size:18px; }

  /* -------- 샘플 선택 -------- */
  .sample-grid{ display:flex; flex-direction:column; gap:12px; margin-top:14px; }
  .sample-card{
    display:flex; align-items:center; gap:14px;
    background:var(--panel2); border:1px solid var(--line);
    border-radius:12px; padding:14px;
    cursor:pointer;
    transition:transform .08s ease, border-color .15s ease;
  }
  .sample-card:active{ transform:scale(.98); }
  .sample-card.done{ border-color:var(--good); }
  .sample-card.disabled{ cursor:default; }
  .sample-swatch{
    width:46px; height:46px; border-radius:50%;
    flex-shrink:0; border:2px solid rgba(255,255,255,.15);
  }
  .sample-info{ flex:1; min-width:0; }
  .sample-name{ font-weight:700; font-size:16px; }
  .sample-status{ font-size:12.5px; color:var(--fg-dim); margin-top:2px; }
  .sample-status.done{ color:var(--good); }
  .sample-check{
    width:26px; height:26px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:900; flex-shrink:0;
  }
  .sample-check.empty{ border:2px dashed var(--line); color:transparent; }
  .sample-check.done{ background:var(--good); color:#06210a; }

  /* -------- 측정 화면 -------- */
  .device{
    position:relative;
    background:var(--panel2);
    border:1px solid var(--line);
    border-radius:12px;
    height:120px;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:16px;
    overflow:hidden;
  }
  .device-slot{
    width:60px; height:74px;
    border:2px dashed var(--line);
    border-radius:6px;
    display:flex; align-items:flex-end; justify-content:center;
    overflow:hidden;
  }
  .device-cuvette{
    width:0%; height:0%;
    border-radius:3px;
    transition:width .45s cubic-bezier(.34,1.4,.4,1), height .45s cubic-bezier(.34,1.4,.4,1);
  }
  .device-cuvette.filled{ width:70%; height:88%; }
  .light-beam{
    position:absolute; left:0; top:50%; transform:translateY(-50%);
    width:0; height:4px; background:var(--accent);
    box-shadow:0 0 10px var(--accent);
    opacity:0;
  }
  .light-beam.on{ animation:beamSweep 1.1s ease-in-out; }
  @keyframes beamSweep{
    0%{ width:0; opacity:0; }
    15%{ opacity:1; }
    70%{ width:100%; opacity:1; }
    100%{ width:100%; opacity:0; }
  }

  .step-label{
    font-size:12.5px; color:var(--fg-dim);
    text-transform:uppercase; letter-spacing:.04em;
    margin-bottom:6px;
  }
  .step-title{ font-size:16px; font-weight:700; margin-bottom:14px; }

  /* 다이얼(타이밍) 미니게임 */
  .dial-wrap{ margin:6px 0 16px; }
  .dial-track{
    position:relative;
    height:34px;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:8px;
    margin-bottom:14px;
    overflow:hidden;
  }
  .dial-target{
    position:absolute; top:0; bottom:0;
    background:rgba(92,230,92,.28);
    border-left:2px solid var(--good);
    border-right:2px solid var(--good);
  }
  .dial-marker{
    position:absolute; top:-3px;
    width:4px; height:40px;
    background:var(--accent);
    border-radius:2px;
    box-shadow:0 0 8px var(--accent);
    transform:translateX(-50%);
  }
  .dial-hint{ font-size:12px; color:var(--fg-dim); text-align:center; margin-bottom:10px; }

  /* 시간압박 바 (2026-07-12 R2 추가) */
  .timer-row{ margin:2px 0 10px; }
  .timer-track{ height:6px; background:var(--bg); border:1px solid var(--line); border-radius:4px; overflow:hidden; }
  .timer-bar{ height:100%; width:100%; background:var(--good); transition:width .1s linear, background .2s ease; }
  .timer-bar.warn{ background:var(--warn); }
  .timer-bar.bad{ background:var(--bad); }
  .timer-chip{ display:inline-block; margin-top:6px; font-size:12.5px; color:var(--accent); font-weight:700; letter-spacing:.02em; }

  /* 콤보 배지 (2026-07-12 R2 추가) */
  .combo-badge{
    display:inline-block; margin:8px auto 2px; padding:5px 14px; border-radius:20px;
    font-size:14px; font-weight:900; background:rgba(255,183,3,.22); color:var(--accent);
    animation:comboPop .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes comboPop{
    0%{ transform:scale(.6) rotate(-4deg); opacity:0; }
    60%{ transform:scale(1.12) rotate(2deg); }
    100%{ transform:scale(1) rotate(0); opacity:1; }
  }
  .combo-broke{ margin:8px 0 2px; font-size:12.5px; color:var(--fg-dim); text-align:center; }
  .dial-target.pulse{ animation:targetPulse 1.1s ease-in-out infinite; }
  @keyframes targetPulse{
    0%,100%{ box-shadow:inset 0 0 0 rgba(92,230,92,0); }
    50%{ box-shadow:inset 0 0 14px rgba(92,230,92,.55); }
  }
  .dial-track.in-target{ border-color:var(--good); }
  .dial-marker.in-target{ background:var(--good); box-shadow:0 0 14px var(--good); }

  /* 결과 모달 */
  .result-pop{
    text-align:center; padding:6px 0 2px;
  }
  .result-pop .big-num{
    font-size:38px; font-weight:900; margin:6px 0;
  }
  .result-pop .tag{
    display:inline-block; padding:4px 12px; border-radius:20px;
    font-size:13px; font-weight:700; margin-bottom:4px;
  }
  .tag.good{ background:rgba(92,230,92,.18); color:var(--good); }
  .tag.warn{ background:rgba(255,207,63,.18); color:var(--warn); }
  .tag.bad{ background:rgba(255,92,92,.18); color:var(--bad); }
  .pop-anim{ animation:popIn .35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes popIn{ 0%{ transform:scale(.7); opacity:0;} 100%{ transform:scale(1); opacity:1;} }
  .shake{ animation:shakeAnim .35s ease; }
  @keyframes shakeAnim{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-6px); }
    40%{ transform:translateX(5px); }
    60%{ transform:translateX(-3px); }
    80%{ transform:translateX(2px); }
  }

  /* -------- 결과 그래프 -------- */
  .graph{
    display:flex; align-items:flex-end; justify-content:space-around;
    height:180px; margin:18px 0 6px;
    border-bottom:2px solid var(--line);
    padding:0 6px;
    gap:14px;
  }
  .bar-col{ display:flex; flex-direction:column; align-items:center; flex:1; height:100%; justify-content:flex-end; }
  .bar-val{ font-size:12.5px; font-weight:700; margin-bottom:6px; opacity:0; transition:opacity .3s ease; }
  .bar-val.show{ opacity:1; }
  .bar{
    width:100%; max-width:56px;
    border-radius:6px 6px 0 0;
    height:0%;
    transition:height 1s cubic-bezier(.22,.9,.3,1.2);
    border:2px solid transparent;
  }
  .bar.correct{ border-color:var(--good); }
  .bar.wrong{ border-color:var(--bad); }
  .bar-label{ font-size:12px; color:var(--fg-dim); margin-top:8px; text-align:center; }

  .rank-instruction{ font-size:14px; margin:18px 0 10px; text-align:center; }
  .rank-row{ display:flex; gap:10px; }
  .rank-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;
    background:var(--panel2); border:2px solid var(--line);
    border-radius:12px; padding:14px 6px;
    cursor:pointer; position:relative;
    transition:transform .08s ease, border-color .15s ease, opacity .2s ease;
  }
  .rank-btn:active{ transform:scale(.96); }
  .rank-btn:disabled{ opacity:.5; cursor:default; }
  .rank-swatch{ width:32px; height:32px; border-radius:50%; border:2px solid rgba(255,255,255,.15); }
  .rank-name{ font-size:13px; font-weight:600; }
  .rank-badge{
    position:absolute; top:-8px; right:-8px;
    width:24px; height:24px; border-radius:50%;
    background:var(--accent); color:#1a1300;
    font-size:13px; font-weight:900;
    display:flex; align-items:center; justify-content:center;
  }

  .final-score{ text-align:center; padding:8px 0; }
  .final-score .grade{ font-size:56px; font-weight:900; line-height:1; margin:10px 0; }
  .final-score .num{ font-size:16px; color:var(--fg-dim); }
  .breakdown{ margin-top:16px; font-size:13.5px; color:var(--fg-dim); text-align:left; }
  .breakdown div{ display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px dashed var(--line); }
  .breakdown div span:last-child{ color:var(--fg); font-weight:700; }

  .confetti-layer{
    position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50;
  }
  .confetti-piece{
    position:absolute; top:-20px;
    width:8px; height:8px;
    animation:fall 1.4s ease-in forwards;
  }
  @keyframes fall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(420px) rotate(540deg); opacity:0; }
  }

  .progress-dots{ display:flex; justify-content:center; gap:8px; margin:14px 0 2px; }
  .progress-dots span{ width:8px; height:8px; border-radius:50%; background:var(--line); }
  .progress-dots span.on{ background:var(--accent); }

  .true-order{ font-size:13px; color:var(--fg-dim); text-align:center; margin-top:14px; }
  .rank-feedback{ font-size:13.5px; text-align:center; margin-top:10px; padding:10px 12px; border-radius:10px; background:var(--panel2); }
  .rank-feedback.good{ color:var(--good); }
  .rank-feedback.bad{ color:var(--warn); }

  .best-record{
    margin-top:10px; font-size:12.5px; color:var(--fg-dim); text-align:center;
    background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:8px 10px;
  }
  .best-record b{ color:var(--accent); }
  .new-record-tag{
    display:inline-block; margin-top:8px; padding:4px 12px; border-radius:20px;
    font-size:12.5px; font-weight:800; background:rgba(255,183,3,.18); color:var(--accent);
  }
  .play-count{ font-size:12px; color:var(--fg-dim); margin-top:4px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  // 2026-07-11 조정: 값 간격을 좁혀 저정확도 측정 시 실제로 순위가 헷갈릴 수 있게 함
  // (기존 32/95/160은 오차가 아무리 커도 순서가 절대 안 뒤집혔음 → 측정 무의미화 문제)
  // 2026-07-12(R2) timeLimit 추가: 다이얼 정지에 제한시간을 둬서 "무제한 대기 후 완벽한 타이밍만 노리기"를 막음(시간압박)
  var SAMPLES = [
    { id:"cola",   name:"콜라(355ml)",     color:"#3a2317", trueValue:34,  speed:1.15, targetW:22, timeLimit:5.5 },
    { id:"coffee", name:"드립커피(240ml)", color:"#8a5a2e", trueValue:72,  speed:1.55, targetW:17, timeLimit:4.6 },
    { id:"energy", name:"에너지음료(250ml)", color:"#8fef2a", trueValue:110, speed:2.0,  targetW:13, timeLimit:3.8 }
  ];

  var state = {
    screen: "intro",      // intro | select | measure | result | final
    measureSub: "insert",  // insert | measuring | done
    currentId: null,
    rankOrder: [],
    combo: 0,             // 2026-07-12(R2) 연속 정확측정(80%+) 콤보
    maxCombo: 0,
    lastComboBroke: false,
    startTime: null       // 실험 시작 시각(전체 소요시간 표시용)
  };

  var rafId = null;
  var dialData = null; // {startTime, speed, targetStart, targetW, running}

  function getSample(id){
    for (var i=0;i<SAMPLES.length;i++){ if (SAMPLES[i].id===id) return SAMPLES[i]; }
    return null;
  }
  function allMeasured(){
    return SAMPLES.every(function(s){ return s.measured != null; });
  }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function esc(s){ return String(s); }
  function timerChipHtml(){ return '<div class="timer-chip" id="timerChip">⏱ 0:00</div>'; }

  /* ---------------- 전체 소요시간 표시(2026-07-12 R2, 채점에는 미반영·표시용) ---------------- */
  var elapsedTimerId = null;
  function startElapsedTimer(){
    stopElapsedTimer();
    elapsedTimerId = setInterval(function(){
      var chip = document.getElementById("timerChip");
      if (!chip || state.startTime == null) return;
      var sec = Math.floor((Date.now() - state.startTime) / 1000);
      var m = Math.floor(sec/60), r = sec%60;
      chip.textContent = "⏱ " + m + ":" + (r<10?"0":"") + r;
    }, 500);
  }
  function stopElapsedTimer(){
    if (elapsedTimerId){ clearInterval(elapsedTimerId); elapsedTimerId = null; }
  }
  function formatElapsed(){
    if (state.startTime == null) return "0:00";
    var sec = Math.floor((Date.now() - state.startTime) / 1000);
    var m = Math.floor(sec/60), r = sec%60;
    return m + ":" + (r<10?"0":"") + r;
  }

  /* ---------------- 반복 플레이 기록(localStorage, 실패해도 게임 진행에 영향 없음) ---------------- */
  var STORAGE_KEY = "caffeineProto_best_v1";
  var PLAYS_KEY = "caffeineProto_plays_v1";
  function loadBest(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return null; }
  }
  function saveBest(rec){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(rec)); }catch(e){ /* 저장 불가 환경(무시) */ }
  }
  function loadPlayCount(){
    try{
      var n = parseInt(localStorage.getItem(PLAYS_KEY) || "0", 10);
      return isNaN(n) ? 0 : n;
    }catch(e){ return 0; }
  }
  function bumpPlayCount(){
    var n = loadPlayCount() + 1;
    try{ localStorage.setItem(PLAYS_KEY, String(n)); }catch(e){ /* 무시 */ }
    return n;
  }

  function app(){ return document.getElementById("app"); }

  function render(){
    stopDialLoop();
    var el = app();
    if (state.screen === "intro") el.innerHTML = renderIntro();
    else if (state.screen === "select") el.innerHTML = renderSelect();
    else if (state.screen === "measure") el.innerHTML = renderMeasure();
    else if (state.screen === "result") el.innerHTML = renderResult();
    else if (state.screen === "final") el.innerHTML = renderFinal();
    bindEvents();
    if (state.screen === "measure" && state.measureSub === "measuring") startDialLoop();
    if (state.screen === "result") requestAnimationFrame(animateBars);
  }

  /* ---------------- 인트로 ---------------- */
  function renderIntro(){
    var best = loadBest();
    var plays = loadPlayCount();
    var recordBlock = best
      ? '<div class="best-record">이전 최고 기록 · <b>'+esc(best.grade)+'등급</b> ('+best.total+'점) · 총 '+plays+'회 도전</div>'
      : '<div class="best-record">아직 기록이 없어요 · 첫 도전을 시작해보세요</div>';
    return ''
    + '<header><h1>카페인 분석 실험</h1><p>2교육실 화학 · 일상실험실 연계 프로토타입</p></header>'
    + '<div class="card">'
    + '  <div class="step-label">실험 목표</div>'
    + '  <div class="step-title">분광광도계로 음료 3종의 카페인 농도를 측정하고,<br>낮은 순서대로 정렬하라</div>'
    + '  <div class="intro-diagram">'
    + '    <div class="intro-shape" style="background:'+SAMPLES[0].color+'"></div>'
    + '    <span class="intro-arrow">→</span>'
    + '    <div class="intro-shape" style="background:#2b3138;border:1px solid var(--line);border-radius:4px;"></div>'
    + '    <span class="intro-arrow">→</span>'
    + '    <div class="intro-shape" style="background:var(--accent);border-radius:4px;width:14px;"></div>'
    + '    <span class="intro-arrow">→</span>'
    + '    <div class="intro-shape" style="background:var(--panel2);border:1px solid var(--line);border-radius:4px 4px 0 0;height:22px;align-self:flex-end;"></div>'
    + '  </div>'
    + '  <div style="font-size:12.5px;color:var(--fg-dim);text-align:center;margin-top:2px;">측정을 대충 하면 막대 높이도 흐트러져 순서를 헷갈리게 됩니다</div>'
    + '  <button class="btn" id="btnStart" style="margin-top:14px;">실험 시작</button>'
    + '  ' + recordBlock
    + '</div>';
  }

  /* ---------------- 샘플 선택 ---------------- */
  function renderSelect(){
    var doneCount = SAMPLES.filter(function(s){return s.measured!=null;}).length;
    var cards = SAMPLES.map(function(s){
      var done = s.measured != null;
      return ''
      + '<div class="sample-card '+(done?'done':'')+'" data-id="'+s.id+'">'
      + '  <div class="sample-swatch" style="background:'+s.color+'"></div>'
      + '  <div class="sample-info">'
      + '    <div class="sample-name">'+esc(s.name)+'</div>'
      + '    <div class="sample-status '+(done?'done':'')+'">'+(done ? '측정 완료 · 정확도 '+s.accuracy+'%' : '미측정')+'</div>'
      + '  </div>'
      + '  <div class="sample-check '+(done?'done':'empty')+'">✓</div>'
      + '</div>';
    }).join('');

    var comboHint = state.combo>=2
      ? '<div class="combo-badge">🔥 콤보 x'+state.combo+' 유지 중 · 다음 측정도 성공하면 계속 올라갑니다</div>'
      : '';

    return ''
    + '<header><h1>샘플 선택</h1><p>순서대로 3개 음료를 모두 측정하세요 ('+doneCount+'/3)</p>' + timerChipHtml() + '</header>'
    + '<div class="progress-dots">' + SAMPLES.map(function(s){return '<span class="'+(s.measured!=null?'on':'')+'"></span>';}).join('') + '</div>'
    + comboHint
    + '<div class="sample-grid">' + cards + '</div>'
    + '<button class="btn" id="btnToResult" style="margin-top:18px;" '+(allMeasured()?'':'disabled')+'>결과 보기</button>';
  }

  /* ---------------- 측정 화면 ---------------- */
  function renderMeasure(){
    var s = getSample(state.currentId);
    var body = "";

    if (state.measureSub === "insert"){
      body = ''
      + '<div class="step-label">1단계</div>'
      + '<div class="step-title">'+esc(s.name)+' 샘플을 분광광도계에 넣기</div>'
      + '<div class="device">'
      + '  <div class="light-beam" id="beam"></div>'
      + '  <div class="device-slot"><div class="device-cuvette" id="cuvette" style="background:'+s.color+'"></div></div>'
      + '</div>'
      + '<button class="btn" id="btnInsert">샘플 넣기</button>';
    } else if (state.measureSub === "measuring"){
      var s2 = s;
      body = ''
      + '<div class="step-label">2단계</div>'
      + '<div class="step-title">빛이 통과할 때, 흡광도 눈금이 초록 구간에 있을 때 정지!</div>'
      + '<div class="device">'
      + '  <div class="light-beam on" id="beam"></div>'
      + '  <div class="device-slot"><div class="device-cuvette filled" style="background:'+s2.color+'"></div></div>'
      + '</div>'
      + '<div class="timer-row"><div class="timer-track"><div class="timer-bar" id="timerBar"></div></div></div>'
      + '<div class="dial-wrap">'
      + '  <div class="dial-hint">정지 버튼을 초록 구간에서 눌러야 정확도가 올라갑니다 · 시간 안에 못 누르면 측정 실패!</div>'
      + '  <div class="dial-track" id="dialTrack">'
      + '    <div class="dial-target" id="dialTarget"></div>'
      + '    <div class="dial-marker" id="dialMarker"></div>'
      + '  </div>'
      + '</div>'
      + '<button class="btn" id="btnStop">정지! (측정)</button>';
    } else if (state.measureSub === "done"){
      var acc = s.accuracy;
      var timedOut = !!s.timedOut;
      var tagClass = timedOut ? "bad" : (acc>=80 ? "good" : (acc>=50 ? "warn" : "bad"));
      var tagText = timedOut ? "시간 초과!" : (acc>=80 ? "정확한 측정!" : (acc>=50 ? "쓸만한 측정" : "오차가 큽니다"));
      var comboBlock = "";
      if (!timedOut && acc>=80 && state.combo>=2){
        comboBlock = '<div class="combo-badge">🔥 콤보 x'+state.combo+'!</div>';
      } else if (state.lastComboBroke){
        comboBlock = '<div class="combo-broke">콤보가 끊겼습니다</div>';
      }
      var descText = timedOut
        ? '제한시간 안에 정지하지 못했습니다 · 다음 샘플에선 더 서둘러 보세요'
        : esc(s.name)+' 흡광도 측정 완료 · 정확한 수치는 다음 그래프에서 막대 높이로 비교하세요';
      body = ''
      + '<div class="card result-pop pop-anim" id="resultCard">'
      + '  <div class="tag '+tagClass+'">'+tagText+'</div>'
      + '  <div class="big-num">정확도 '+acc+'%</div>'
      + comboBlock
      + '  <div style="color:var(--fg-dim);font-size:13px;">'+descText+'</div>'
      + '</div>'
      + '<div class="confetti-layer" id="confettiHolder"></div>'
      + '<button class="btn" id="btnBackSelect" style="margin-top:16px;">선택 화면으로</button>';
    }

    return '<header><h1>'+ (s? esc(s.name) : '측정') +'</h1><p>실험 절차대로 진행하세요</p>' + timerChipHtml() + '</header>' + '<div class="card">' + body + '</div>';
  }

  /* ---------------- 결과(그래프+랭킹) ---------------- */
  function renderResult(){
    var maxV = Math.max.apply(null, SAMPLES.map(function(s){ return s.measured; }));
    // 2026-07-11: mg 숫자는 처음부터 HTML에 넣지 않는다(순위를 다 고른 뒤에만 공개) —
    // 막대 높이만 보고 판단하게 해서 "측정을 못하면 결론도 틀린다"는 긴장을 만듦
    var bars = SAMPLES.map(function(s){
      return ''
      + '<div class="bar-col">'
      + '  <div class="bar-val" data-id="'+s.id+'" data-mg="'+s.measured.toFixed(1)+'"></div>'
      + '  <div class="bar" id="bar-'+s.id+'" data-target="'+ (s.measured/maxV*100) +'" style="background:'+s.color+'"></div>'
      + '  <div class="bar-label">'+esc(s.name.split('(')[0])+'</div>'
      + '</div>';
    }).join('');

    var rankBtns = SAMPLES.map(function(s){
      var idx = state.rankOrder.indexOf(s.id);
      var picked = idx>=0;
      return ''
      + '<button class="rank-btn" data-id="'+s.id+'" '+(picked?'disabled':'')+'>'
      + (picked ? '<span class="rank-badge">'+(idx+1)+'</span>' : '')
      + '  <div class="rank-swatch" style="background:'+s.color+'"></div>'
      + '  <div class="rank-name">'+esc(s.name.split('(')[0])+'</div>'
      + '</button>';
    }).join('');

    var evalBlock = "";
    if (state.rankOrder.length === 3){
      var correctOrder = SAMPLES.slice().sort(function(a,b){return a.trueValue-b.trueValue;}).map(function(s){return s.id;});
      var correctCount = 0;
      for (var i=0;i<3;i++){ if (state.rankOrder[i]===correctOrder[i]) correctCount++; }
      var perfect = correctCount===3;
      var fbClass = perfect ? "good" : "bad";
      var fbMsg = perfect
        ? "정확한 측정 덕분에 막대 높이 차이가 뚜렷했고, 순서를 제대로 읽어냈습니다."
        : (correctCount===0
            ? "측정 오차가 커서 막대 높이가 비슷하게 나왔고, 순서를 헷갈렸습니다. 다이얼을 더 정확히 멈춰보세요."
            : "측정 오차 때문에 일부 막대 높이가 비슷해져 순서가 뒤바뀌었습니다. 정확도를 높이면 더 잘 구분됩니다.");
      evalBlock = ''
      + '<div class="rank-feedback '+fbClass+'">'+fbMsg+'</div>'
      + '<div class="true-order">정답 순서: ' + correctOrder.map(function(id){return getSample(id).name.split('(')[0];}).join(' &lt; ') + '</div>'
      + '<button class="btn" id="btnToFinal" style="margin-top:16px;">점수 확인</button>';
    }

    return ''
    + '<header><h1>측정 결과</h1><p>막대 그래프로 카페인 농도를 비교하세요</p></header>'
    + '<div class="card">'
    + '  <div class="graph">' + bars + '</div>'
    + '  <div class="rank-instruction">카페인 함량이 <b>낮은 순서</b>대로 음료를 클릭하세요</div>'
    + '  <div class="rank-row">' + rankBtns + '</div>'
    + evalBlock
    + '</div>';
  }

  /* ---------------- 최종 점수 ---------------- */
  function renderFinal(){
    var elapsedStr = formatElapsed();
    stopElapsedTimer(); // 2026-07-12 R2: 실험 종료 시점에 표시용 타이머 정지(채점엔 미반영)

    var avgAcc = SAMPLES.reduce(function(sum,s){return sum+s.accuracy;},0) / SAMPLES.length;
    // 2026-07-12 R2: 콤보 점수(10점) 신설에 맞춰 배점 재배분(정확도 60→55, 순위 40→35, 콤보 신규 10) = 총 100 유지
    var accuracyScore = Math.round(avgAcc*0.55);

    var correctOrder = SAMPLES.slice().sort(function(a,b){return a.trueValue-b.trueValue;}).map(function(s){return s.id;});
    var correctCount = 0;
    for (var i=0;i<3;i++){ if (state.rankOrder[i]===correctOrder[i]) correctCount++; }
    var rankScore = Math.round(correctCount/3*35);

    var comboScore = state.maxCombo>=3 ? 10 : (state.maxCombo===2 ? 5 : 0);

    var total = Math.min(100, accuracyScore + rankScore + comboScore);
    var grade = total>=90 ? "S" : total>=75 ? "A" : total>=60 ? "B" : "C";

    // 반복 플레이 훅: 최고 기록 갱신 여부 + 도전 횟수 (localStorage 실패해도 채점엔 영향 없음)
    var prevBest = loadBest();
    var isNewRecord = !prevBest || total > prevBest.total;
    if (isNewRecord) saveBest({ total: total, grade: grade, date: new Date().toISOString().slice(0,10) });
    var playCount = bumpPlayCount();
    var recordTag = (isNewRecord && prevBest) ? '<div class="new-record-tag">신기록!</div>' : '';

    return ''
    + '<header><h1>실험 완료</h1><p>측정 정확도 + 순위 정답으로 채점</p></header>'
    + '<div class="card final-score">'
    + '  <div class="num">종합 점수</div>'
    + '  <div class="grade" id="gradeText">'+grade+'</div>'
    + '  <div class="num">'+total+' / 100점</div>'
    + recordTag
    + '  <div class="breakdown">'
    + '    <div><span>측정 정확도 평균</span><span>'+Math.round(avgAcc)+'% → '+accuracyScore+'/55점</span></div>'
    + '    <div><span>순위 정답 ('+correctCount+'/3 일치)</span><span>'+rankScore+'/35점</span></div>'
    + '    <div><span>최고 콤보</span><span>'+state.maxCombo+'콤보 → '+comboScore+'/10점</span></div>'
    + '    <div><span>소요 시간</span><span>'+elapsedStr+'</span></div>'
    + '  </div>'
    + '  <div class="play-count">총 '+playCount+'회 도전 · 최고 기록 '+(isNewRecord?grade:prevBest.grade)+'등급 ('+(isNewRecord?total:prevBest.total)+'점)</div>'
    + '  <div class="confetti-layer" id="confettiHolder2"></div>'
    + '</div>'
    + '<button class="btn" id="btnRestart" style="margin-top:16px;">다시하기</button>';
  }

  /* ---------------- 이벤트 바인딩 ---------------- */
  function bindEvents(){
    var btnStart = document.getElementById("btnStart");
    if (btnStart) btnStart.addEventListener("click", function(){
      state.startTime = Date.now();
      startElapsedTimer();
      state.screen="select"; render();
    });

    var btnToResult = document.getElementById("btnToResult");
    if (btnToResult) btnToResult.addEventListener("click", function(){
      if (!allMeasured()) return;
      state.screen="result"; state.rankOrder=[]; render();
    });

    var cards = document.querySelectorAll(".sample-card");
    cards.forEach(function(c){
      c.addEventListener("click", function(){
        var id = c.getAttribute("data-id");
        var s = getSample(id);
        if (s.measured != null) return; // 이미 측정한 샘플은 재진입 안 함(짧은 플레이 유지)
        state.currentId = id;
        state.measureSub = "insert";
        state.screen = "measure";
        render();
      });
    });

    var btnInsert = document.getElementById("btnInsert");
    if (btnInsert) btnInsert.addEventListener("click", function(){
      var cuvette = document.getElementById("cuvette");
      btnInsert.disabled = true;
      cuvette.classList.add("filled");
      setTimeout(function(){
        state.measureSub = "measuring";
        render();
      }, 480);
    });

    var btnStop = document.getElementById("btnStop");
    if (btnStop) btnStop.addEventListener("click", onStopMeasurement);

    var dialTrack = document.getElementById("dialTrack");
    if (dialTrack) dialTrack.addEventListener("click", onStopMeasurement);

    var btnBackSelect = document.getElementById("btnBackSelect");
    if (btnBackSelect) btnBackSelect.addEventListener("click", function(){ state.screen="select"; render(); });

    var rankBtns = document.querySelectorAll(".rank-btn");
    rankBtns.forEach(function(b){
      b.addEventListener("click", function(){
        var id = b.getAttribute("data-id");
        if (state.rankOrder.indexOf(id) >= 0) return;
        if (state.rankOrder.length >= 3) return;
        state.rankOrder.push(id);
        render();
      });
    });

    var btnToFinal = document.getElementById("btnToFinal");
    if (btnToFinal) btnToFinal.addEventListener("click", function(){ state.screen="final"; render(); });

    var btnRestart = document.getElementById("btnRestart");
    if (btnRestart) btnRestart.addEventListener("click", function(){
      SAMPLES.forEach(function(s){ s.measured=null; s.accuracy=null; s.timedOut=null; });
      stopElapsedTimer();
      state = { screen:"intro", measureSub:"insert", currentId:null, rankOrder:[], combo:0, maxCombo:0, lastComboBroke:false, startTime:null };
      render();
    });

    // 키보드(데스크톱) 스페이스바로 측정 정지
    document.onkeydown = function(e){
      if (e.code === "Space" && state.screen === "measure" && state.measureSub === "measuring"){
        e.preventDefault();
        onStopMeasurement();
      }
    };

    if (state.screen === "measure" && state.measureSub === "done"){
      var s = getSample(state.currentId);
      if (s.accuracy >= 60){
        spawnConfetti(document.getElementById("confettiHolder"), s.color, s.accuracy>=80?18:10);
      }
    }
    if (state.screen === "final"){
      var total = document.getElementById("gradeText").textContent;
      if (total === "S" || total === "A"){
        spawnConfetti(document.getElementById("confettiHolder2"), "var(--accent)", 26);
      }
    }
  }

  /* ---------------- 다이얼 미니게임 로직 ---------------- */
  function startDialLoop(){
    var s = getSample(state.currentId);
    var targetStart = 8 + Math.random() * (92 - s.targetW - 8);
    // 2026-07-12 R2: timeLimit·finished 플래그 추가(시간압박 + 중복 정지 방지)
    dialData = { startTime: performance.now(), speed: s.speed, targetStart: targetStart, targetW: s.targetW, timeLimit: s.timeLimit, finished: false };

    var targetEl = document.getElementById("dialTarget");
    if (targetEl){
      targetEl.style.left = targetStart + "%";
      targetEl.style.width = s.targetW + "%";
      targetEl.classList.add("pulse"); // 시각적 손맛 강화
    }

    // 더 어려운(빠른) 샘플일수록 예측하기 힘든 잔떨림(2차 하모닉)을 살짝 얹음
    var wobbleAmp = Math.max(0, s.speed - 1.2) * 6;

    function frame(now){
      if (!dialData || dialData.finished) return;
      var elapsed = (now - dialData.startTime) / 1000;

      // 2026-07-12 R2: 제한시간 초과 시 자동 정지(실패 처리) — 무제한 대기로 완벽한 타이밍만 노리는 것 방지
      if (elapsed >= dialData.timeLimit){
        onStopMeasurement({ timedOut:true });
        return;
      }

      var pos = 50 + 48 * Math.sin(elapsed * dialData.speed * 1.6)
                + wobbleAmp * Math.sin(elapsed * dialData.speed * 4.3);
      pos = clamp(pos, 1, 99);
      dialData.currentPos = pos;

      var inTarget = pos >= dialData.targetStart && pos <= (dialData.targetStart + dialData.targetW);
      var marker = document.getElementById("dialMarker");
      if (marker){
        marker.style.left = pos + "%";
        marker.classList.toggle("in-target", inTarget);
      }
      var trackEl = document.getElementById("dialTrack");
      if (trackEl) trackEl.classList.toggle("in-target", inTarget);

      var remainRatio = clamp(1 - elapsed / dialData.timeLimit, 0, 1);
      var timerBar = document.getElementById("timerBar");
      if (timerBar){
        timerBar.style.width = (remainRatio * 100) + "%";
        timerBar.classList.toggle("warn", remainRatio <= 0.4 && remainRatio > 0.18);
        timerBar.classList.toggle("bad", remainRatio <= 0.18);
      }

      rafId = requestAnimationFrame(frame);
    }
    rafId = requestAnimationFrame(frame);
  }

  function stopDialLoop(){
    if (rafId){ cancelAnimationFrame(rafId); rafId = null; }
  }

  function onStopMeasurement(opts){
    if (!dialData || dialData.finished) return;
    dialData.finished = true;
    opts = opts || {};
    var s = getSample(state.currentId);
    var accuracy;

    if (opts.timedOut){
      // 시간 내 정지 못함 = 위치와 무관하게 실패 처리(운으로 얻어걸리는 것 방지)
      accuracy = Math.round(12 + Math.random() * 18); // 12~30%
    } else {
      var pos = dialData.currentPos != null ? dialData.currentPos : 50;
      var half = dialData.targetW / 2;
      var center = dialData.targetStart + half;
      var diff = Math.abs(pos - center);
      if (diff <= half) accuracy = 100;
      else accuracy = Math.round(clamp(100 - (diff - half) / 25 * 100, 0, 100));
    }

    // 2026-07-11: .35 → .55. 값 간격을 좁힌 것과 맞물려 저정확도 측정 시 인접 샘플의 측정값 범위가 겹치게 함
    // 2026-07-12 R2: .55 → .85 재조정(시뮬레이션 검증: 정확도 60~70%대에서 순위 역전 확률이 0%→약25%로 상승,
    // 80%+ 구간은 여전히 0%로 안전해 "정확히 재면 보상, 대충 재면 흔들림" 긴장이 명확해짐)
    var noiseFactor = (100 - accuracy) / 100 * 0.85;
    var sign = Math.random() < 0.5 ? -1 : 1;
    var measuredVal = s.trueValue * (1 + sign * noiseFactor);

    s.accuracy = accuracy;
    s.measured = Math.round(measuredVal * 10) / 10;
    s.timedOut = !!opts.timedOut;

    // 2026-07-12 R2: 콤보 — 80%+ & 시간초과 아님이 연속되면 콤보 유지, 아니면 리셋
    var success = accuracy >= 80 && !opts.timedOut;
    state.lastComboBroke = state.combo > 0 && !success;
    state.combo = success ? state.combo + 1 : 0;
    state.maxCombo = Math.max(state.maxCombo, state.combo);

    stopDialLoop();
    state.measureSub = "done";
    render();

    var card = document.getElementById("resultCard");
    if (card && accuracy < 50) card.classList.add("shake");
  }

  /* ---------------- 그래프 애니메이션 ---------------- */
  function animateBars(){
    var bars = document.querySelectorAll(".bar");
    bars.forEach(function(b){
      var t = parseFloat(b.getAttribute("data-target"));
      requestAnimationFrame(function(){ b.style.height = t + "%"; });
    });

    // 랭킹 3개를 다 고른 뒤에만 정확한 mg 수치를 공개 + 정답/오답 보더 표시
    if (state.rankOrder.length === 3){
      setTimeout(function(){
        document.querySelectorAll(".bar-val").forEach(function(v){
          v.textContent = v.getAttribute("data-mg") + "mg";
          v.classList.add("show");
        });
      }, 500);

      var correctOrder = SAMPLES.slice().sort(function(a,b){return a.trueValue-b.trueValue;}).map(function(s){return s.id;});
      SAMPLES.forEach(function(s){
        var idx = state.rankOrder.indexOf(s.id);
        var bar = document.getElementById("bar-"+s.id);
        if (!bar) return;
        if (correctOrder[idx] === s.id) bar.classList.add("correct");
        else bar.classList.add("wrong");
      });
    }
  }

  /* ---------------- 컨페티(도형 파티클) ---------------- */
  function spawnConfetti(holder, color, count){
    if (!holder) return;
    var colors = [color, "#ffb703", "#5ce65c", "#eef1f5"];
    for (var i=0;i<count;i++){
      var p = document.createElement("div");
      p.className = "confetti-piece";
      p.style.left = (10 + Math.random()*80) + "%";
      p.style.background = colors[i % colors.length];
      p.style.borderRadius = (Math.random()<0.5) ? "50%" : "2px";
      p.style.animationDelay = (Math.random()*0.2) + "s";
      p.style.animationDuration = (1.1 + Math.random()*0.6) + "s";
      holder.appendChild(p);
    }
    setTimeout(function(){ if (holder) holder.innerHTML = ""; }, 1800);
  }

  render();
})();
</script>
</body>
