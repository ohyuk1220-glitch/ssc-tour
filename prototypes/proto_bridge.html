<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>다리 건설 프로토타입</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #0c1420; color: #eef3f8;
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    word-break: keep-all; overflow-wrap: break-word;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }
  body { line-height: 1.6; }

  #app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    height: 100dvh;
  }

  header {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
    padding: 10px 14px;
    background: #101a2b;
    border-bottom: 1px solid #1f2f45;
  }
  header h1 {
    font-size: 15px; margin: 0; font-weight: 800; letter-spacing: -0.01em;
    color: #f4c95d;
  }
  #hud {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600; color: #9db2c9;
    flex-wrap: wrap; justify-content: flex-end;
  }
  #level-pill, #budget-pill, #state-pill, #sag-pill {
    background: #17273d; border: 1px solid #2c4360;
    border-radius: 999px; padding: 4px 12px;
    color: #d7e6f5; font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  #level-pill { color: #9fd3ff; border-color: #2a4a68; }
  #budget-pill.low { color: #ff8a65; border-color: #6b3324; }
  #budget-pill.empty { color: #ff5252; border-color: #7a2020; }
  #sag-pill { display: none; }
  #sag-pill.warn { color: #f4c95d; border-color: #6b5320; }
  #sag-pill.danger { color: #ff5252; border-color: #7a2020; }

  #canvas-wrap {
    position: relative; flex: 1 1 auto; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% -10%, #17263d 0%, #0c1420 65%);
    touch-action: none;
    overflow: hidden;
  }
  canvas {
    display: block;
    max-width: 100%; max-height: 100%;
    touch-action: none;
  }

  #toast {
    position: absolute; left: 50%; top: 14px;
    transform: translate(-50%, -140%);
    background: #24344a; border: 1px solid #3c5573;
    color: #fff; font-size: 13px; font-weight: 700;
    padding: 8px 16px; border-radius: 10px;
    pointer-events: none; opacity: 0;
    transition: transform .18s ease, opacity .18s ease;
    white-space: nowrap;
    z-index: 5;
  }
  #toast.show { transform: translate(-50%, 0); opacity: 1; }

  #overlay {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center;
    background: rgba(6,10,18,0.72);
    z-index: 10;
  }
  #overlay.show { display: flex; }
  #overlay-card {
    background: #101c2e; border: 1px solid #2c4360;
    border-radius: 16px; padding: 26px 28px;
    max-width: 340px; width: calc(100% - 48px);
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  #overlay-icon { font-size: 40px; margin-bottom: 6px; }
  #overlay-title { font-size: 19px; font-weight: 800; margin: 4px 0 8px; }
  #overlay-title.success { color: #7ee0a8; }
  #overlay-title.fail { color: #ff8a80; }
  #overlay-desc { font-size: 13px; color: #a9bcd0; margin-bottom: 18px; }
  .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  button {
    font-family: inherit; font-weight: 700; font-size: 13px;
    border-radius: 10px; border: 1px solid #2c4360;
    background: #1a2b42; color: #eef3f8;
    padding: 10px 16px; cursor: pointer;
    transition: background .12s ease, transform .08s ease;
  }
  button:active { transform: scale(0.96); }
  button.primary { background: #f4c95d; color: #1a1206; border-color: #f4c95d; }
  button.primary:disabled { background: #3a3627; color: #6b6650; border-color: #3a3627; cursor: not-allowed; }
  button.ghost { background: transparent; }

  footer {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    background: #101a2b; border-top: 1px solid #1f2f45;
  }
  #hint {
    font-size: 11.5px; color: #7d92aa; flex: 1 1 auto; min-width: 0;
  }
  #hint b { color: #d7e6f5; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🌉 다리 건설 — G전시실 프로토타입</h1>
    <div id="hud">
      <span id="level-pill">레벨 1/3</span>
      <span id="budget-pill">빔 0/0</span>
      <span id="sag-pill">처짐 -</span>
      <span id="state-pill">설계 중</span>
    </div>
  </header>

  <div id="canvas-wrap">
    <canvas id="cv"></canvas>
    <div id="toast"></div>
    <div id="overlay">
      <div id="overlay-card">
        <div id="overlay-icon">🚧</div>
        <div id="overlay-title">결과</div>
        <div id="overlay-desc">설명</div>
        <div class="btn-row">
          <button class="primary" id="btn-next-level" style="display:none;">다음 레벨 ▶</button>
          <button id="btn-retry">다시 도전</button>
          <button class="ghost" id="btn-reset-overlay">새로 설계</button>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div id="hint">노드를 <b>탭</b>해 선택 → 조준선이 <b>초록</b>이면 연결 · 이미 연결된 두 노드면 <b>해체</b></div>
    <div class="btn-row">
      <button class="ghost" id="btn-clear">초기화</button>
      <button class="primary" id="btn-test">테스트 주행 ▶</button>
    </div>
  </footer>
</div>

<script>
(function(){
  "use strict";

  // ---------- 캔버스 세팅 ----------
  var canvas = document.getElementById('cv');
  var ctx = canvas.getContext('2d');
  var W = 900, H = 500; // 논리 좌표계
  var dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));

  function resize(){
    var wrap = document.getElementById('canvas-wrap');
    var maxW = wrap.clientWidth - 4;
    var maxH = wrap.clientHeight - 4;
    var scale = Math.min(maxW / W, maxH / H);
    scale = Math.max(scale, 0.3);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    displayScale = scale;
  }
  var displayScale = 1;
  window.addEventListener('resize', resize);

  // ---------- 레벨 정의 ----------
  // bays = cols+1, 완전삼각화(상판+하판+대각선 1개씩) 필요 빔 수 = 3*bays
  // budget이 그보다 크면(+슬랙) 여유 있음 / 같으면 딱 맞음 / 작으면 일부러 골라서 빼야 함(긴장)
  var LEVELS = [
    { label:'짧은 다리 (튜토리얼)', cols:2, budget:10, loadMul:2.2, sagLimit:15 }, // 완전삼각화=9, 슬랙+1.
                                                                        // sagLimit 48→15 (R2, 실측 근거): 원래 48은 대각선 0개(무브레이싱)
                                                                        // 로도 자연 처짐이 19에 그쳐 항상 통과 — "삼각화 필수" 훅이
                                                                        // 죽어있었음. 15는 완전삼각화(처짐13.3, 여유 1.7)는 넉넉히
                                                                        // 통과하고, 무브레이싱(19)·버티컬만(15.9)·대각선 1개만(15.1)은
                                                                        // 확실히 탈락시킴. 단, 절벽 인접 구간(0번 베이) 대각선만 생략한
                                                                        // 설계(처짐14.6)는 통과 — "가운데 구간이 더 중요하다"는 레벨3
                                                                        // 교훈을 미리 살짝 맛보게 하는 의도적 여유.
    { label:'표준 다리', cols:5, budget:18, loadMul:2.7, sagLimit:48 }, // 완전삼각화=18, 딱 맞음 (기존 밸런스 그대로 보존)
    { label:'긴 다리',   cols:7, budget:22, loadMul:3.1, sagLimit:72, // 완전삼각화=24, -2(구간을 골라 생략해야 함).
                                                                        // sagLimit 68→72 (R2): hazard 하중이 상시로 더해지는 만큼
                                                                        // 완전삼각화 처짐이 소폭 올라가(≈66) 그대로면 여유가 줄어들어
                                                                        // 보정. 완전삼각화 여유는 여전히 6 이상으로 유지됨(실측).
      hazard: { colIdx:4, force:0.6, label:'관측 장비' }
      // R2 추가: 5번째 자유노드(중앙보다 살짝 오른쪽, 비대칭)에 상시 고정하중을 건다.
      // R1 진단(트럭의 이동 하중만으로는 "대각선 개수"만 맞으면 어디 놓든 통과 — 위치가
      // 중요해지지 않음)의 해결책. 대각선 개수만으로는 여전히 부족하고, 정확히 이 지점에
      // 대각선을 붙여야 한다(HAZARD_BRACED 판정 + HAZARD_UNBRACED_MULT, verletStep 참고).
    },
  ];
  var currentLevelIdx = 0;

  // ---------- 월드 상수 ----------
  var TOP_Y = 200, BOT_Y = 320;     // 상현/하현 높이
  var FLOOR_Y = 470;                // 계곡 바닥(추락 판정)
  var BAY_W = 100;                  // 구간 폭(고정)
  var GAP_L, GAP_R;                 // 절벽 안쪽 끝(레벨마다 재계산)
  var COLS = [];                    // 자유 노드 x열(레벨마다 재계산)
  var MAX_LEN = 175;                // 빔 최대 길이 (근접 연결만 허용)
  var BEAM_BUDGET = 18;             // 레벨마다 buildWorld()에서 갱신
  var TRUCK_LOAD_MUL = 2.7;         // 레벨마다 buildWorld()에서 갱신

  var GRAVITY = 0.30;
  var CONSTRAINT_ITER = 6;          // 검증된 원본 값 그대로(L2 밸런스 보존 — 손대면 안 됨, 실측 확인됨)
  var STRESS_ADD = 1.0;
  var STRESS_DECAY = 0.05;
  var STRESS_LIMIT = 9.0;
  var STRESS_RATIO_THRESHOLD = 0.10;
  var SAG_LIMIT = 48; // 상판이 이 이상 처지면 트럭이 통과 불가로 판정 — 레벨마다 buildWorld()에서 lvl.sagLimit로 갱신
  var WARN_RATIO = 0.85; // 이 이상 스트레스면 붕괴 전 경고(색은 이미 빨강, 추가로 흔들림+토스트)
  var HAZARD_NODE = null;  // R2 추가: 상시 집중하중이 걸리는 노드(레벨에 hazard 정의 있을 때만) — buildWorld()에서 갱신
  var HAZARD_FORCE = 0;    // 프레임마다 HAZARD_NODE.y에 더해지는 고정 하중 크기(대각선으로 지지됐을 때 기준값)
  var HAZARD_LABEL = '';
  var HAZARD_BRACED = true;   // 하중 지점에 실제로 대각선이 닿아있는지 — startSim()에서 매 주행마다 재판정
  var HAZARD_UNBRACED_MULT = 15; // 대각선 없이 방치하면 하중이 이만큼 배로 커짐.
  // 실측(퍼펫티어 자동 플레이테스트, 8베이 중 2개 생략하는 28가지 조합 전수 검사):
  // force=0.6 · mult=15 · sagLimit=72 조합에서 "하중지점에 닿는 대각선이 있는 21가지 조합"은
  // 100% 성공(처짐 61.4~70.6), "하중지점 대각선이 없는 7가지 조합"은 100% 실패(처짐 72.0~72.4) —
  // 다른 어떤 대각선을 더 생략하든 상관없이 오직 "그 지점에 대각선이 있는가"만으로 승패가 갈림.

  // ---------- 노드/빔 데이터 ----------
  var nodes = [];   // {id,x,y,ox,oy,homeX,homeY,pinned,role}
  var beams = [];   // {a,b,rest,stress,broken}
  var nid = 0;

  function addNode(x, y, pinned, role){
    var n = { id: nid++, x:x, y:y, ox:x, oy:y, homeX:x, homeY:y, pinned:pinned, role:role, dead:false, vx:0 };
    nodes.push(n);
    return n;
  }

  var leftTop, leftBot, rightTop, rightBot;
  var topChain = []; // [leftTop, ...COLS top nodes..., rightTop] 순서

  function buildWorld(levelIdx){
    if (typeof levelIdx !== 'number') levelIdx = currentLevelIdx;
    levelIdx = Math.max(0, Math.min(LEVELS.length - 1, levelIdx));
    currentLevelIdx = levelIdx;
    var lvl = LEVELS[levelIdx];

    var bays = lvl.cols + 1;
    var span = BAY_W * bays;
    GAP_L = Math.round((W - span) / 2);
    GAP_R = GAP_L + span;
    BEAM_BUDGET = lvl.budget;
    TRUCK_LOAD_MUL = lvl.loadMul;
    SAG_LIMIT = lvl.sagLimit || 48;
    COLS = [];
    for (var c = 0; c < lvl.cols; c++) COLS.push(GAP_L + BAY_W * (c + 1));

    nodes = []; beams = []; nid = 0;
    leftTop = addNode(GAP_L, TOP_Y, true, 'anchor');
    leftBot = addNode(GAP_L, BOT_Y, true, 'anchor');
    rightTop = addNode(GAP_R, TOP_Y, true, 'anchor');
    rightBot = addNode(GAP_R, BOT_Y, true, 'anchor');

    topChain = [leftTop];
    var topFree = [], botFree = [];
    for (var i=0;i<COLS.length;i++){
      var t = addNode(COLS[i], TOP_Y, false, 'free');
      var b = addNode(COLS[i], BOT_Y, false, 'free');
      topFree.push(t); botFree.push(b);
      topChain.push(t);
    }
    topChain.push(rightTop);

    HAZARD_NODE = null; HAZARD_FORCE = 0; HAZARD_LABEL = ''; HAZARD_BRACED = true;
    if (lvl.hazard && topFree[lvl.hazard.colIdx]){
      HAZARD_NODE = topFree[lvl.hazard.colIdx];
      HAZARD_FORCE = lvl.hazard.force;
      HAZARD_LABEL = lvl.hazard.label || '집중하중';
    }

    selected = null;
    pointerWorld = null;
    warnedThisRun = false;
    firstBreakInfo = null;
    brokeAnyLogged = false;
    truck = null;
  }

  function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

  function findBeam(a,b){
    for (var i=0;i<beams.length;i++){
      var bm = beams[i];
      if (!bm.broken && ((bm.a===a && bm.b===b) || (bm.a===b && bm.b===a))) return bm;
    }
    return null;
  }

  function budgetLeft(){
    var used = 0;
    for (var i=0;i<beams.length;i++) if (!beams[i].broken) used++;
    return BEAM_BUDGET - used;
  }

  // ---------- 상태 ----------
  var MODE = 'design'; // design | sim | success | fail
  var selected = null;
  var pointerWorld = null; // 빔 미리보기용 현재 조준 위치
  var truck = null;
  var shakeT = 0;
  var particles = [];
  var toastT = 0;
  var warnedThisRun = false;   // 이번 주행에서 붕괴 경고를 이미 띄웠는지
  var firstBreakInfo = null;   // 이번 주행에서 처음 끊어진 빔 설명(피드백용)
  var brokeAnyLogged = false;

  function toast(msg){
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    toastT = 1.1;
  }

  function setHUD(){
    var bl = budgetLeft();
    var pill = document.getElementById('budget-pill');
    pill.textContent = '빔 ' + (BEAM_BUDGET - bl) + '/' + BEAM_BUDGET;
    pill.classList.toggle('low', bl <= 3 && bl > 0);
    pill.classList.toggle('empty', bl <= 0);
    var sp = document.getElementById('state-pill');
    sp.textContent = MODE === 'design' ? '설계 중' : MODE === 'sim' ? '주행 중' : MODE === 'success' ? '성공' : '붕괴';
    document.getElementById('btn-test').disabled = (MODE === 'sim');
    document.getElementById('level-pill').textContent =
      '레벨 ' + (currentLevelIdx+1) + '/' + LEVELS.length + ' · ' + LEVELS[currentLevelIdx].label;
  }

  function updateSagPill(){
    var pill = document.getElementById('sag-pill');
    if (MODE !== 'sim' || !truck || truck.falling){
      pill.style.display = 'none';
      return;
    }
    pill.style.display = '';
    var sag = Math.max(0, truck.sag || 0);
    var ratio = sag / SAG_LIMIT;
    pill.textContent = '처짐 ' + Math.round(sag) + '/' + SAG_LIMIT;
    pill.classList.toggle('warn', ratio >= 0.6 && ratio < 0.9);
    pill.classList.toggle('danger', ratio >= 0.9);
  }

  // ---------- 입력 ----------
  function toWorld(clientX, clientY){
    var r = canvas.getBoundingClientRect();
    var x = (clientX - r.left) / displayScale;
    var y = (clientY - r.top) / displayScale;
    return {x:x, y:y};
  }

  function nearestNode(pt){
    var best = null, bd = 22; // 히트 반경(논리px)
    for (var i=0;i<nodes.length;i++){
      var n = nodes[i];
      if (n.dead) continue;
      var d = Math.hypot(n.x-pt.x, n.y-pt.y);
      if (d < bd){ bd = d; best = n; }
    }
    return best;
  }

  function onTap(clientX, clientY){
    if (MODE !== 'design') return;
    var pt = toWorld(clientX, clientY);
    var n = nearestNode(pt);
    if (!n){ selected = null; return; }

    if (!selected){ selected = n; return; }
    if (selected === n){ selected = null; return; }

    var a = selected, b = n;
    selected = null;
    pointerWorld = null;

    var existing = findBeam(a,b);
    if (existing){
      existing.broken = true; // 해체 = 목록에서 제거 취급(예산 회수)
      beams = beams.filter(function(x){ return x !== existing; });
      toast('빔을 해체했습니다');
      setHUD();
      return;
    }

    var d = dist(a,b);
    if (d > MAX_LEN){
      toast('너무 멀어요 — 가까운 노드끼리만 연결');
      return;
    }
    if (a.pinned && b.pinned){
      toast('양쪽 다 절벽 고정점입니다');
      return;
    }
    if (budgetLeft() <= 0){
      toast('예산을 다 썼습니다');
      return;
    }
    beams.push({ a:a, b:b, rest:d, stress:0, broken:false });
    setHUD();
  }

  canvas.addEventListener('pointerdown', function(e){
    e.preventDefault();
    onTap(e.clientX, e.clientY);
  });
  canvas.addEventListener('pointermove', function(e){
    if (MODE !== 'design' || !selected){ pointerWorld = null; return; }
    pointerWorld = toWorld(e.clientX, e.clientY);
  });
  canvas.addEventListener('pointerleave', function(){ pointerWorld = null; });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape' && MODE === 'design' && selected){
      selected = null; pointerWorld = null;
    }
  });

  // ---------- 물리(자체 구현 — Verlet + 거리 구속) ----------
  function resetPhysicsPositions(){
    for (var i=0;i<nodes.length;i++){
      var n = nodes[i];
      n.x = n.homeX; n.y = n.homeY;
      n.ox = n.homeX; n.oy = n.homeY;
      n.dead = false;
      n.pinned = (n.role === 'anchor');
    }
    for (var j=0;j<beams.length;j++){ beams[j].stress = 0; beams[j].broken = false; }
    warnedThisRun = false;
    firstBreakInfo = null;
    brokeAnyLogged = false;
  }

  function startSim(){
    if (MODE !== 'design') return;
    // 상판(top chord) 구간이 모두 이어져 있는지 확인
    var brokenAt = -1;
    for (var i=0;i<topChain.length-1;i++){
      if (!findBeam(topChain[i], topChain[i+1])){ brokenAt = i; break; }
    }
    if (brokenAt >= 0){
      toast('상판(윗줄)이 끊겨 있어 트럭이 지나갈 수 없어요');
      return;
    }
    for (var k=0;k<nodes.length;k++){
      if (nodes[k].role === 'free') nodes[k].pinned = false;
    }
    // 집중하중 지점에 실제로 대각선이 닿아 있는지 주행 시작 시 판정(설계를 그대로 반영)
    HAZARD_BRACED = true;
    if (HAZARD_NODE){
      HAZARD_BRACED = beams.some(function(bm){
        if (bm.broken) return false;
        if (bm.a !== HAZARD_NODE && bm.b !== HAZARD_NODE) return false;
        return Math.abs(bm.a.y - bm.b.y) > 1 && Math.abs(bm.a.x - bm.b.x) > 1; // 진짜 대각선만 인정(상판/하판/수직재 제외)
      });
    }
    warnedThisRun = false;
    firstBreakInfo = null;
    brokeAnyLogged = false;
    truck = { x: leftTop.x - 60, y: TOP_Y - 14, seg: 0, falling:false, vy:0, angle:0, speed: 62, sag: 0 };
    MODE = 'sim';
    setHUD();
  }

  function beamRoleLabel(bm){
    var sameY = Math.abs(bm.a.y - bm.b.y) < 1;
    if (sameY){
      return Math.abs(bm.a.y - TOP_Y) < 1 ? '상판' : '하판';
    }
    return '대각선';
  }

  function verletStep(dt){
    for (var i=0;i<nodes.length;i++){
      var n = nodes[i];
      if (n.pinned || n.dead) continue;
      var vx = (n.x - n.ox) * 0.992;
      var vy = (n.y - n.oy) * 0.992;
      var nx = n.x + vx;
      var ny = n.y + vy + GRAVITY;
      n.ox = n.x; n.oy = n.y;
      n.x = nx; n.y = ny;
    }
    // 트럭 하중: 근처 상현 노드를 추가로 끌어내림
    if (truck && !truck.falling){
      for (var t=0;t<nodes.length;t++){
        var nn = nodes[t];
        if (nn.pinned || nn.dead || nn.role !== 'free') continue;
        if (Math.abs(nn.homeY - TOP_Y) > 1) continue; // 상현 노드만
        var d = Math.abs(nn.x - truck.x);
        if (d < 150){
          var f = (1 - d/150) * TRUCK_LOAD_MUL;
          nn.y += f;
        }
      }
    }
    // 상시 집중하중(R2 추가): 트럭 위치와 무관하게 특정 지점을 계속 눌러
    // "대각선을 어디에 놓느냐"가 실제로 성패를 가르게 만든다. 그 지점에 대각선이
    // 없으면(HAZARD_BRACED=false) 하중이 훨씬 크게 작용 — 위치 선택이 곧 승패.
    if (HAZARD_NODE && !HAZARD_NODE.dead && !HAZARD_NODE.pinned){
      HAZARD_NODE.y += HAZARD_FORCE * (HAZARD_BRACED ? 1 : HAZARD_UNBRACED_MULT);
    }

    for (var iter=0; iter<CONSTRAINT_ITER; iter++){
      for (var b=0;b<beams.length;b++){
        var bm = beams[b];
        if (bm.broken) continue;
        var a = bm.a, c = bm.b;
        if (a.dead || c.dead) continue;
        var dx = c.x - a.x, dy = c.y - a.y;
        var d2 = Math.hypot(dx,dy) || 0.0001;
        var diff = (bm.rest - d2) / d2;
        var pinnedA = a.pinned, pinnedC = c.pinned;
        var moveA = pinnedA ? 0 : (pinnedC ? 1 : 0.5);
        var moveC = pinnedC ? 0 : (pinnedA ? 1 : 0.5);
        var ox = dx * diff, oy = dy * diff;
        if (!pinnedA){ a.x -= ox * moveA; a.y -= oy * moveA; }
        if (!pinnedC){ c.x += ox * moveC; c.y += oy * moveC; }
      }
    }

    // 스트레스 누적 & 파단 판정 (마지막 반복 후 잔여 변형으로 판단)
    var brokeAny = false;
    var maxRatio = 0;
    for (var b2=0;b2<beams.length;b2++){
      var bm2 = beams[b2];
      if (bm2.broken) continue;
      var d3 = dist(bm2.a, bm2.b);
      var ratio = Math.abs(d3 - bm2.rest) / bm2.rest;
      if (ratio > STRESS_RATIO_THRESHOLD){
        bm2.stress += STRESS_ADD * (ratio - STRESS_RATIO_THRESHOLD) * 6;
      } else {
        bm2.stress = Math.max(0, bm2.stress - STRESS_DECAY);
      }
      maxRatio = Math.max(maxRatio, bm2.stress / STRESS_LIMIT);
      if (bm2.stress >= STRESS_LIMIT){
        bm2.broken = true;
        brokeAny = true;
        if (!brokeAnyLogged){
          brokeAnyLogged = true;
          firstBreakInfo = beamRoleLabel(bm2);
        }
        spawnBreakFx(bm2);
      }
    }
    if (brokeAny) shakeT = 0.25;

    // 붕괴 직전 경고: 아직 안 끊어졌지만 한계에 근접 — 토스트 1회 + 미세 흔들림
    if (MODE === 'sim' && maxRatio >= WARN_RATIO){
      shakeT = Math.max(shakeT, 0.08);
      if (!warnedThisRun){
        warnedThisRun = true;
        toast('위험! 빔이 한계에 가까워지고 있어요');
      }
    }
  }

  function spawnBreakFx(bm){
    var mx = (bm.a.x+bm.b.x)/2, my = (bm.a.y+bm.b.y)/2;
    for (var i=0;i<7;i++){
      particles.push({
        x:mx, y:my,
        vx:(Math.random()-0.5)*4, vy:(Math.random()-1.2)*3,
        life:0.6, role:'spark'
      });
    }
  }

  function updateTruck(dt){
    if (!truck) return;
    if (truck.falling){
      truck.vy += 0.5;
      truck.y += truck.vy;
      truck.angle += 0.12;
      if (truck.y > FLOOR_Y + 60){
        triggerFail(truck.failMsg || '다리가 끊겨 트럭이 계곡으로 떨어졌습니다');
      }
      return;
    }
    truck.x += truck.speed * dt;

    // 현재 구간 찾기 (topChain 순서 기준)
    var seg = 0;
    for (var i=0;i<topChain.length-1;i++){
      if (truck.x >= topChain[i].x){ seg = i; }
    }
    var nA = topChain[seg], nB = topChain[Math.min(seg+1, topChain.length-1)];
    var segBeam = findBeam(nA, nB);
    if (!segBeam && nB.x > nA.x && truck.x >= nA.x){
      // 앞 구간이 끊어져 있는데 트럭이 그 위로 진입 -> 추락
      truck.falling = true;
      truck.failMsg = firstBreakInfo
        ? (firstBreakInfo + ' 빔이 끊어져 다리가 무너졌습니다')
        : '다리가 끊겨 트럭이 계곡으로 떨어졌습니다';
      return;
    }
    var span = Math.max(1, nB.x - nA.x);
    var f = Math.min(1, Math.max(0, (truck.x - nA.x) / span));
    var groundY = nA.y + (nB.y - nA.y) * f;
    truck.y = groundY - 14;
    truck.sag = groundY - TOP_Y;

    if (truck.sag > SAG_LIMIT){
      truck.falling = true;
      // R3 커즈메틱: hazard가 있는 레벨(3)은 범용 문구 대신 전용 힌트로 —
      // 이 레벨의 진짜 교훈은 "어디에" 대각선을 놓느냐이기 때문에 콕 집어 안내한다.
      var lvl = LEVELS[currentLevelIdx];
      truck.failMsg = lvl.hazard
        ? ('처짐이 너무 커서 다리가 무너졌습니다 — ' + (HAZARD_LABEL || '관측 장비') + '가 있는 구간에 대각선을 넣어보세요')
        : '처짐이 너무 커서 다리가 무너졌습니다 — 삼각 구조로 힘을 분산해보세요';
      return;
    }

    if (truck.y > FLOOR_Y){
      truck.falling = true;
      return;
    }

    if (truck.x >= rightTop.x + 46){
      triggerSuccess();
    }
  }

  function triggerSuccess(){
    if (MODE !== 'sim') return;
    MODE = 'success';
    for (var i=0;i<26;i++){
      particles.push({
        x: rightTop.x - 20 + Math.random()*40, y: TOP_Y - 10,
        vx:(Math.random()-0.5)*3, vy:-Math.random()*3-1,
        life: 1.0 + Math.random()*0.6, role:'confetti',
        hue: Math.floor(Math.random()*360)
      });
    }
    showOverlay(true);
    setHUD();
  }
  function triggerFail(msg){
    if (MODE !== 'sim') return;
    MODE = 'fail';
    shakeT = 0.4;
    showOverlay(false, msg);
    setHUD();
  }

  function showOverlay(success, msg){
    var ov = document.getElementById('overlay');
    var icon = document.getElementById('overlay-icon');
    var title = document.getElementById('overlay-title');
    var desc = document.getElementById('overlay-desc');
    var nextBtn = document.getElementById('btn-next-level');
    var retryBtn = document.getElementById('btn-retry');
    if (success){
      icon.textContent = '🎉';
      title.textContent = '성공!';
      title.className = 'success';
      var usedBeams = beams.filter(function(b){return !b.broken;}).length;
      desc.textContent = '트럭이 안전하게 건넜습니다. 사용한 빔 ' + usedBeams + '/' + BEAM_BUDGET + '개.';

      var hasNext = currentLevelIdx < LEVELS.length - 1;
      nextBtn.style.display = '';
      nextBtn.textContent = hasNext ? '다음 레벨 ▶' : '처음부터 다시';
      nextBtn.onclick = function(){ goToLevel(hasNext ? currentLevelIdx + 1 : 0); };
      retryBtn.classList.add('ghost');
      retryBtn.classList.remove('primary');
    } else {
      icon.textContent = '💥';
      title.textContent = '붕괴!';
      title.className = 'fail';
      desc.textContent = msg || '다리가 하중을 버티지 못했습니다.';

      nextBtn.style.display = 'none';
      retryBtn.classList.remove('ghost');
      retryBtn.classList.add('primary');
    }
    ov.classList.add('show');
  }
  function goToLevel(idx){
    document.getElementById('overlay').classList.remove('show');
    buildWorld(idx);
    MODE = 'design';
    var lvl = LEVELS[idx];
    var msg = '레벨 ' + (idx+1) + ': ' + lvl.label;
    if (lvl.hazard) msg += ' — ' + (lvl.hazard.label || '집중하중') + ' 지점 근처를 특히 신경 쓰세요';
    toast(msg);
    setHUD();
  }
  document.getElementById('btn-retry').addEventListener('click', function(){
    document.getElementById('overlay').classList.remove('show');
    resetPhysicsPositions();
    MODE = 'design';
    setHUD();
  });
  document.getElementById('btn-reset-overlay').addEventListener('click', function(){
    document.getElementById('overlay').classList.remove('show');
    buildWorld(currentLevelIdx);
    MODE = 'design';
    setHUD();
  });
  document.getElementById('btn-clear').addEventListener('click', function(){
    if (MODE === 'sim') return;
    buildWorld(currentLevelIdx);
    MODE = 'design';
    toast('초기화했습니다');
    setHUD();
  });
  document.getElementById('btn-test').addEventListener('click', startSim);

  // ---------- 렌더 ----------
  function drawCliffs(){
    ctx.fillStyle = '#233348';
    ctx.fillRect(0, FLOOR_Y+2, W, H-FLOOR_Y-2); // 계곡 바닥 그림자대 (물/안개 느낌)
    var grad = ctx.createLinearGradient(0,FLOOR_Y-40,0,H);
    grad.addColorStop(0,'#16324a');
    grad.addColorStop(1,'#0a1826');
    ctx.fillStyle = grad;
    ctx.fillRect(0, FLOOR_Y-40, W, H-(FLOOR_Y-40));

    ctx.fillStyle = '#4a5a6b';
    // 왼쪽 절벽
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(GAP_L+14, TOP_Y-46);
    ctx.lineTo(GAP_L, TOP_Y-30); ctx.lineTo(GAP_L, BOT_Y+40);
    ctx.lineTo(GAP_L-30, BOT_Y+90); ctx.lineTo(0, H);
    ctx.closePath(); ctx.fill();
    // 오른쪽 절벽
    ctx.beginPath();
    ctx.moveTo(W,0); ctx.lineTo(GAP_R-14, TOP_Y-46);
    ctx.lineTo(GAP_R, TOP_Y-30); ctx.lineTo(GAP_R, BOT_Y+40);
    ctx.lineTo(GAP_R+30, BOT_Y+90); ctx.lineTo(W, H);
    ctx.closePath(); ctx.fill();

    ctx.strokeStyle = '#5f7285'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(GAP_L, TOP_Y-30); ctx.lineTo(GAP_L, BOT_Y+40); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(GAP_R, TOP_Y-30); ctx.lineTo(GAP_R, BOT_Y+40); ctx.stroke();
  }

  function drawSagGuide(){
    if (MODE !== 'sim' && MODE !== 'fail') return;
    var y = TOP_Y + SAG_LIMIT;
    ctx.save();
    // R3 커즈메틱: 레벨1(SAG_LIMIT=15)은 상판(TOP_Y)에서 불과 15px 아래라
    // 기존 옅은 핑크(0.4 알파)가 빔 스트레스색(노랑/빨강)에 묻혔다.
    // → 팔레트에 없는 시안 계열로 바꾸고 알파/굵기를 올려 항상 도드라지게 함.
    ctx.setLineDash([7,5]);
    ctx.strokeStyle = 'rgba(125,216,255,0.85)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(GAP_L, y);
    ctx.lineTo(GAP_R, y);
    ctx.stroke();
    ctx.setLineDash([]);
    // 양끝 세로 눈금 — 선이 배경/구조물과 섞여도 경계가 뚜렷하게
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(GAP_L, y-5); ctx.lineTo(GAP_L, y+5);
    ctx.moveTo(GAP_R, y-5); ctx.lineTo(GAP_R, y+5);
    ctx.stroke();
    // 라벨은 어두운 배경 박스 위에 그려 어떤 배경(빔·계곡·하늘)과 겹쳐도 읽히게
    var label = '처짐 한계선';
    ctx.font = 'bold 10px -apple-system, sans-serif';
    var tw = ctx.measureText(label).width;
    var padX = 6;
    var boxW = tw + padX*2, boxH = 15;
    var boxX = GAP_R - boxW, boxY = y - 6 - boxH;
    ctx.fillStyle = 'rgba(8,14,24,0.8)';
    ctx.fillRect(boxX, boxY, boxW, boxH);
    ctx.fillStyle = '#c9ecff';
    ctx.textAlign = 'left';
    ctx.fillText(label, boxX + padX, boxY + 11);
    ctx.restore();
  }

  function drawHazard(){
    if (!HAZARD_NODE) return;
    var x = HAZARD_NODE.x, y = HAZARD_NODE.y;
    ctx.save();
    // 장비 상자 + 안테나(점+선만 사용, 픽셀아트 아님)
    ctx.fillStyle = '#ffb454';
    ctx.strokeStyle = '#7a4a10';
    ctx.lineWidth = 1.5;
    ctx.fillRect(x-11, y-24, 22, 16);
    ctx.strokeRect(x-11, y-24, 22, 16);
    ctx.beginPath();
    ctx.moveTo(x, y-24); ctx.lineTo(x, y-32);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x, y-34, 2.4, 0, Math.PI*2);
    ctx.fillStyle = '#ff5252';
    ctx.fill();
    ctx.fillStyle = 'rgba(255,180,84,0.9)';
    ctx.font = 'bold 10px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(HAZARD_LABEL, x, y-38);
    ctx.textAlign = 'left';
    ctx.restore();
  }

  function beamColor(bm){
    var s = Math.min(1, bm.stress / STRESS_LIMIT);
    if (s < 0.45) return '#8fa6bd';
    if (s < 0.8) return '#f4c95d';
    return '#ff5252';
  }

  function drawBeams(){
    for (var i=0;i<beams.length;i++){
      var bm = beams[i];
      if (bm.broken) continue;
      ctx.strokeStyle = beamColor(bm);
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(bm.a.x, bm.a.y);
      ctx.lineTo(bm.b.x, bm.b.y);
      ctx.stroke();
    }
  }

  function drawPreview(){
    if (MODE !== 'design' || !selected || !pointerWorld) return;
    var target = nearestNode(pointerWorld);
    var tx = target ? target.x : pointerWorld.x;
    var ty = target ? target.y : pointerWorld.y;
    var color = 'rgba(180,195,210,0.5)'; // 기본: 노드 없는 곳을 조준 중(중립)
    if (target && target !== selected){
      var existing = findBeam(selected, target);
      if (existing){
        color = 'rgba(244,201,93,0.85)'; // 해체 예정
      } else {
        var d = dist(selected, target);
        var valid = d <= MAX_LEN && !(selected.pinned && target.pinned) && budgetLeft() > 0;
        color = valid ? 'rgba(126,224,168,0.9)' : 'rgba(255,90,90,0.85)';
      }
    } else if (target === selected){
      return; // 자기 자신 위 — 미리보기 불필요
    }
    ctx.save();
    ctx.setLineDash([5,5]);
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(selected.x, selected.y);
    ctx.lineTo(tx, ty);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  function drawNodes(){
    for (var i=0;i<nodes.length;i++){
      var n = nodes[i];
      if (n.dead) continue;
      var r = n.role === 'anchor' ? 9 : 7;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI*2);
      if (n.role === 'anchor'){
        ctx.fillStyle = '#3c4c5f';
        ctx.fill();
        ctx.strokeStyle = '#8fa6bd'; ctx.lineWidth = 2; ctx.stroke();
      } else {
        ctx.fillStyle = MODE === 'design' ? '#0c1420' : '#132234';
        ctx.fill();
        ctx.strokeStyle = '#cbd9e6'; ctx.lineWidth = 2; ctx.stroke();
      }
      if (selected === n){
        ctx.beginPath();
        ctx.arc(n.x, n.y, r+6, 0, Math.PI*2);
        ctx.strokeStyle = '#f4c95d'; ctx.lineWidth = 2;
        ctx.stroke();
      }
    }
  }

  function drawTruck(){
    if (!truck) return;
    ctx.save();
    ctx.translate(truck.x, truck.y);
    ctx.rotate(truck.falling ? truck.angle : 0);
    ctx.fillStyle = '#f4c95d';
    ctx.fillRect(-16, -10, 32, 14);
    ctx.fillStyle = '#e8dfca';
    ctx.fillRect(-13, -18, 14, 10);
    ctx.fillStyle = '#1a1206';
    ctx.beginPath(); ctx.arc(-10, 6, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(10, 6, 5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawParticles(dt){
    for (var i=particles.length-1;i>=0;i--){
      var p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += (p.role==='confetti'? 0.08 : 0.15);
      p.life -= dt;
      if (p.life <= 0){ particles.splice(i,1); continue; }
      if (p.role === 'confetti'){
        ctx.fillStyle = 'hsl(' + p.hue + ',80%,65%)';
        ctx.fillRect(p.x-2, p.y-2, 4, 4);
      } else {
        ctx.strokeStyle = 'rgba(255,180,120,' + Math.max(0,p.life) + ')';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vx*2, p.y - p.vy*2);
        ctx.stroke();
      }
    }
  }

  function render(dt){
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);
    ctx.save();
    if (shakeT > 0){
      var sx = (Math.random()-0.5) * 8 * shakeT;
      var sy = (Math.random()-0.5) * 8 * shakeT;
      ctx.translate(sx, sy);
    }
    ctx.fillStyle = '#0c1420';
    ctx.fillRect(-10,-10,W+20,H+20);
    drawCliffs();
    drawSagGuide();
    drawBeams();
    drawPreview();
    drawNodes();
    drawHazard();
    drawTruck();
    drawParticles(dt);
    ctx.restore();
  }

  // ---------- 메인 루프 ----------
  var last = performance.now();
  function frame(now){
    var dt = Math.min(0.033, (now - last) / 1000);
    last = now;

    if (shakeT > 0) shakeT = Math.max(0, shakeT - dt);
    if (toastT > 0){
      toastT -= dt;
      if (toastT <= 0) document.getElementById('toast').classList.remove('show');
    }

    if (MODE === 'sim'){
      verletStep(dt);
      updateTruck(dt);
    } else if (MODE === 'success' || MODE === 'fail'){
      verletStep(dt); // 붕괴/도착 후 잔여 흔들림 살짝
    }
    updateSagPill();

    render(dt);
    requestAnimationFrame(frame);
  }

  // ---------- 디버그 훅 (QA 전용, 프로덕션에서도 무해) ----------
  window.__BRIDGE_DEBUG = {
    getNodes: function(){ return nodes; },
    getBeams: function(){ return beams; },
    getTruck: function(){ return truck; },
    getMode: function(){ return MODE; },
    getTopY: function(){ return TOP_Y; },
    getBotY: function(){ return BOT_Y; },
    getGap: function(){ return { left: GAP_L, right: GAP_R }; },
    getLevels: function(){ return LEVELS; },
    getLevel: function(){ return currentLevelIdx; },
    getHazard: function(){ return HAZARD_NODE ? { nodeId: HAZARD_NODE.id, force: HAZARD_FORCE, label: HAZARD_LABEL, braced: HAZARD_BRACED, mult: HAZARD_UNBRACED_MULT } : null; },
    setHazardMult: function(m){ HAZARD_UNBRACED_MULT = m; return HAZARD_UNBRACED_MULT; }, // QA 튜닝 전용
    getBudgetLeft: budgetLeft,
    // 아래는 자동 플레이테스트 전용 — 실제 탭 UI 로직(길이/예산/고정점 규칙)을 그대로 통과시킨다
    setLevel: function(idx){ buildWorld(idx); MODE = 'design'; setHUD(); return currentLevelIdx; },
    connect: function(idA, idB){
      var a = null, b = null;
      for (var i=0;i<nodes.length;i++){
        if (nodes[i].id === idA) a = nodes[i];
        if (nodes[i].id === idB) b = nodes[i];
      }
      if (!a || !b) return { ok:false, reason:'no-node' };
      var existing = findBeam(a,b);
      if (existing){
        existing.broken = true;
        beams = beams.filter(function(x){ return x !== existing; });
        setHUD();
        return { ok:true, action:'removed' };
      }
      var d = dist(a,b);
      if (d > MAX_LEN) return { ok:false, reason:'too-far' };
      if (a.pinned && b.pinned) return { ok:false, reason:'both-pinned' };
      if (budgetLeft() <= 0) return { ok:false, reason:'no-budget' };
      beams.push({ a:a, b:b, rest:d, stress:0, broken:false });
      setHUD();
      return { ok:true, action:'added', budgetLeft: budgetLeft() };
    },
    startSim: startSim,
    step: function(n){
      for (var i=0;i<n;i++){ verletStep(1/30); updateTruck(1/30); }
    }
  };

  // ---------- 시작 ----------
  buildWorld(0);
  resize();
  setHUD();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
