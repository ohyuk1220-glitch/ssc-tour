<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="과학관 탐방">
<meta name="theme-color" content="#0d0b08">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="character/down.png">
<title>과학관 탐방</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --font-sans:"Pretendard",-apple-system,sans-serif;
    --font-num:"Baloo 2",var(--font-sans);
    --ink:#2a2620; --panel:#fffdf7; --line:#e6dcc8;
    --g:#4caf50; --o:#ef8c3b; --b:#4a90e2; --y:#f4c430;
    --gold:#f6b93b;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;word-break:keep-all;overflow-wrap:break-word;
    background:#0d0b08;font-family:var(--font-sans);color:var(--ink);
    user-select:none;-webkit-user-select:none;touch-action:none}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;
    position:fixed;inset:0;width:100vw;height:100vh}

  /* ---- 세로 회전 안내 ---- */
  #rotate{position:fixed;inset:0;z-index:200;background:#0d0b08;color:#fff;
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:30px}
  #rotate .ph{font-size:64px;animation:tilt 1.4s ease-in-out infinite}
  @keyframes tilt{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(78deg)}}
  #rotate p{font-size:17px;line-height:1.6;opacity:.9}
  /* 세로도 플레이 허용 — 회전 강제 안내 끔 */

  /* ---- HUD ---- */
  .hud{position:fixed;z-index:40;pointer-events:none}
  #hud-top{top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 12px}
  .badge{pointer-events:auto;background:var(--panel);border:2px solid var(--ink);
    border-radius:12px;padding:6px 12px;display:flex;align-items:center;gap:7px;
    box-shadow:0 3px 0 rgba(0,0,0,.25);font-weight:800}
  .badge .n{font-family:var(--font-num);font-size:19px;color:var(--o)}
  .badge .t{font-family:var(--font-num);font-size:19px;color:#b8ad97}
  .topbtns{display:flex;gap:8px}
  .iconbtn{pointer-events:auto;width:42px;height:42px;border-radius:12px;border:2px solid var(--ink);
    background:var(--panel);font-size:20px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 0 rgba(0,0,0,.25);cursor:pointer}
  .iconbtn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.25)}
  #floortag{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:40;
    background:rgba(20,16,10,.82);color:#fff;padding:5px 16px;border-radius:20px;
    font-weight:800;font-size:14px;letter-spacing:.3px;white-space:nowrap;
    border:1.5px solid rgba(255,255,255,.25)}
  #floortag .rm{color:var(--gold);margin-left:6px}

  /* ---- 조이스틱 ---- */
  #stick{position:fixed;left:22px;bottom:26px;width:120px;height:120px;z-index:45;
    border-radius:50%;background:rgba(255,253,247,.14);border:2.5px solid rgba(255,255,255,.4);
    touch-action:none}
  #stick .nub{position:absolute;left:50%;top:50%;width:52px;height:52px;margin:-26px 0 0 -26px;
    border-radius:50%;background:rgba(255,253,247,.9);border:2.5px solid var(--ink);
    box-shadow:0 2px 0 rgba(0,0,0,.3)}

  /* ---- A 버튼 ---- */
  #abtn{position:fixed;right:26px;bottom:34px;width:96px;height:96px;z-index:45;
    border-radius:50%;border:3px solid var(--ink);background:#c9c2b0;color:#7a7360;
    font-weight:800;font-size:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;box-shadow:0 4px 0 rgba(0,0,0,.3);cursor:pointer;transition:transform .05s;opacity:.55}
  #abtn.on{background:var(--gold);color:#3a2c00;opacity:1;animation:apulse 1s ease-in-out infinite}
  #abtn.on:active{transform:translateY(3px)}
  #abtn .ai{font-size:30px;line-height:1}
  @keyframes apulse{0%,100%{box-shadow:0 4px 0 rgba(0,0,0,.3)}50%{box-shadow:0 4px 0 rgba(0,0,0,.3),0 0 16px var(--gold)}}

  /* ---- 토스트 ---- */
  #toast{position:fixed;left:50%;bottom:150px;transform:translateX(-50%) translateY(20px);
    z-index:80;background:rgba(20,16,10,.94);color:#fff;padding:11px 20px;border-radius:14px;
    font-weight:700;font-size:14px;opacity:0;transition:.3s;pointer-events:none;max-width:80vw;text-align:center;
    border:1.5px solid rgba(255,255,255,.2)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---- 모달 ---- */
  .modal{position:fixed;inset:0;z-index:100;background:rgba(10,8,5,.72);
    display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
  .modal.show{display:flex}
  .sheet{background:var(--panel);border:2.5px solid var(--ink);border-radius:20px;
    width:min(460px,94vw);max-height:88vh;overflow-y:auto;box-shadow:0 10px 0 rgba(0,0,0,.25);padding:22px}
  .sheet h2{font-size:20px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .sheet .sub{font-size:13px;color:#8a8069;margin-bottom:16px}
  .xbtn{float:right;width:34px;height:34px;border-radius:10px;border:2px solid var(--ink);
    background:#fff;font-size:17px;cursor:pointer;margin:-4px -4px 0 0}
  .map-floor{margin-bottom:12px;border:1.5px solid var(--line);border-radius:12px;overflow:hidden}
  .map-floor h3{font-size:14px;font-weight:800;padding:8px 12px;background:#f3ecdb;
    display:flex;justify-content:space-between}
  .map-floor h3 .cur{color:var(--o);font-size:12px}
  .rooms{display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px}
  .room-chip{font-size:12px;font-weight:700;padding:5px 10px;border-radius:9px;
    border:1.5px solid var(--line);background:#fff;display:flex;align-items:center;gap:5px}
  .room-chip.done{background:#fff7e6;border-color:var(--gold);color:#8a6d00}
  .room-chip.soon{opacity:.5}
  /* 수료증 */
  #cert .sheet{text-align:center;background:linear-gradient(160deg,#fffdf7,#fff4dd)}
  .cert-seal{font-size:60px;margin:6px 0}
  .cert-title{font-family:var(--font-num);font-size:26px;font-weight:800;color:var(--o)}
  .cert-count{font-family:var(--font-num);font-size:15px;color:#8a8069;margin:8px 0 16px}
  .cert-stars{font-size:20px;letter-spacing:3px;margin-bottom:6px}
  .btn-primary{margin-top:16px;width:100%;padding:13px;border-radius:13px;border:2.5px solid var(--ink);
    background:var(--gold);font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.25)}
  .btn-primary:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.25)}
  /* 축하 */
  #cheer .sheet{text-align:center;animation:pop .35s cubic-bezier(.2,1.3,.5,1)}
  @keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  .cheer-icon{font-size:66px;margin:4px 0}
  .cheer-h{font-size:22px;font-weight:800;color:var(--o)}
  .cheer-room{font-size:13px;color:#8a8069;margin-top:4px}

  /* 로딩 */
  #boot{position:fixed;inset:0;z-index:150;background:#12100c;color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
  #boot .bi{font-size:52px}
  #boot .bt{font-weight:800;font-size:17px}
  #boot .bp{font-size:13px;opacity:.6}
</style>
</head>
<body>
<div id="stage"><canvas id="cv"></canvas></div>

<div id="rotate"><div class="ph">📱</div><p><b>휴대폰을 가로로 돌려주세요</b><br>과학관 탐방은 가로 화면에서 즐길 수 있어요</p></div>

<div class="hud" id="hud-top">
  <div style="display:flex;gap:8px">
    <div class="badge" id="badge">🎫 <span class="n" id="sc">0</span><span class="t">/7</span></div>
    <div class="badge">⭐ <span class="n" id="scoreVal">0</span><span class="t">점</span></div>
  </div>
  <div class="topbtns">
    <div class="iconbtn" id="soundBtn">🔊</div>
    <div class="iconbtn" id="mapBtn">📖</div>
    <div class="iconbtn" id="certBtn">🏆</div>
  </div>
</div>
<div id="floortag">1층<span class="rm">로비</span></div>

<div id="stick"><div class="nub" id="nub"></div></div>
<div id="abtn"><span class="ai">🚪</span><span id="alabel">입장</span></div>

<div id="toast"></div>

<!-- 지도 -->
<div class="modal" id="map"><div class="sheet">
  <button class="xbtn" data-close>✕</button>
  <h2>🗺️ 나의 탐험 지도</h2>
  <div class="sub">전시실을 방문해 미니게임 스탬프를 모으세요</div>
  <div id="mapBody"></div>
</div></div>

<!-- 수료증 -->
<div class="modal" id="cert"><div class="sheet">
  <button class="xbtn" data-close>✕</button>
  <div class="cert-seal">🏅</div>
  <div class="cert-title">과학관 탐방 수료증</div>
  <div class="cert-stars" id="certStars"></div>
  <div class="cert-count" id="certCount"></div>
  <div id="certMsg" style="font-size:14px;line-height:1.6;color:#5a5344"></div>
  <button class="btn-primary" data-close>계속 탐험하기</button>
</div></div>

<!-- 축하 -->
<div class="modal" id="cheer"><div class="sheet">
  <div class="cheer-icon" id="cheerIcon">🎉</div>
  <div class="cheer-h">스탬프 획득!</div>
  <div class="cheer-room" id="cheerRoom"></div>
  <button class="btn-primary" id="cheerNext">좋아요!</button>
</div></div>

<!-- 전시물 관람 -->
<div class="modal" id="exhibit"><div class="sheet" style="text-align:center">
  <button class="xbtn" data-close style="float:right">✕</button>
  <div id="exhibitIcon" style="font-size:56px;margin:8px 0 2px"></div>
  <h2 id="exhibitName" style="justify-content:center;display:block;margin-bottom:10px"></h2>
  <p id="exhibitInfo" style="font-size:15px;line-height:1.75;color:#5a5344;text-align:left"></p>
  <button class="btn-primary" data-close>닫기</button>
</div></div>

<!-- 홈 화면 추가(전체화면) 자동 안내 -->
<div id="a2hs" style="position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:120;
  background:rgba(20,16,10,.96);color:#fff;padding:11px 15px;border-radius:14px;display:none;
  align-items:center;gap:11px;font-size:13px;font-weight:700;max-width:92vw;border:1.5px solid #f6b93b;box-shadow:0 4px 16px rgba(0,0,0,.4)">
  <span id="a2hsMsg"></span>
  <button id="a2hsBtn" style="background:#f6b93b;color:#3a2c00;border:none;border-radius:9px;padding:6px 12px;font-weight:800;font-size:13px;cursor:pointer">설치</button>
  <span id="a2hsX" style="cursor:pointer;opacity:.6;font-size:16px">✕</span>
</div>

<div id="boot"><div class="bi">🔬</div><div class="bt">과학관 탐방</div><div class="bp">불러오는 중…</div></div>

/* 스탬프 = 모든 game 핫스팟(층 오버월드 + 실내 방) */
const STAMPS=[];
function _pushGames(scene, floorName){ scene.spots.forEach(s=>{ if(s.kind==="game") STAMPS.push({
  id:s.best, floor:floorName, room:s.room, label:s.label, icon:s.icon, key:s.best}); }); }
FLOORS.forEach(f=>_pushGames(f, f.name));
Object.values(ROOMS).forEach(r=>_pushGames(r, r.floorName));
const STAMP_TOTAL=STAMPS.length;

/* ══════════ localStorage 안전 래퍼 (차단/프라이빗 모드 대비) ══════════ */
function safeGet(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
function safeSet(k,v){ try{localStorage.setItem(k,v);}catch(e){/* 무시: 저장 실패해도 진행 */} }
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
// 장애물(전시물·벽) 충돌: 점(px,py)이 어떤 obstacle rect 안이면 true
function hitObs(obs,px,py){ if(!obs)return false; for(let i=0;i<obs.length;i++){const o=obs[i];
  if(px>o[0]&&px<o[2]&&py>o[1]&&py<o[3])return true;} return false; }

function updateNPCPatrol(npc){
  if(npc._pause>0){ npc._pause--; npc.vx=npc.vy=0; return; }
  const fl=FLOORS.find(f=>f.id===npc.scene);
  const wa=(fl&&fl.walkable)||[0.12,0.4,0.88,0.88];
  // 랜덤 목표점(walkable 안)으로 돌아다님 — 도달하면 잠깐 멈췄다 새 목표
  if(!npc._tgt){ npc._tgt=[wa[0]+Math.random()*(wa[2]-wa[0]), wa[1]+Math.random()*(wa[3]-wa[1])]; }
  const dx=npc._tgt[0]-npc.x, dy=npc._tgt[1]-npc.y, d=Math.hypot(dx,dy);
  const SPD=0.0009;
  if(d<0.02){ npc._tgt=null; npc._pause=40+Math.floor(Math.random()*70); npc.vx=npc.vy=0; return; }
  const vx=dx/d*SPD, vy=dy/d*SPD;
  const obs=fl&&fl.obstacles;
  const nx=npc.x+vx; if(!hitObs(obs,nx,npc.y)) npc.x=nx; else { npc._tgt=null; }  // 막히면 새 목표
  const ny=npc.y+vy; if(!hitObs(obs,npc.x,ny)) npc.y=ny; else { npc._tgt=null; }
  npc.vx=vx; npc.vy=vy;
  if(Math.abs(vx)>Math.abs(vy)) npc.dir=vx>0?"right":"left"; else if(vy!==0) npc.dir=vy>0?"down":"up";
  npc.x=clamp(npc.x,wa[0],wa[2]); npc.y=clamp(npc.y,wa[1],wa[3]);
}

function sfx(freq,dur,type,vol){
  if(!sndOn)return;
  try{ if(!_ac)_ac=new (window.AudioContext||window.webkitAudioContext)();
    const o=_ac.createOscillator(),g=_ac.createGain();
    o.type=type||"square"; o.frequency.value=freq; o.connect(g); g.connect(_ac.destination);
    const v=(vol==null?0.14:vol); g.gain.setValueAtTime(v,_ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+(dur||0.09));
    o.start(); o.stop(_ac.currentTime+(dur||0.09));
  }catch(e){}
}

const CAM_ZOOM=1.05, CAM_ZOOM_ROOM=1.15;   // 컨셉처럼 한 층 전체가 한 화면에(줌아웃=공간감). 실내는 방이 작아 살짝 더 확대
function computeBgRect(){
  // 배경을 화면보다 크게(cover×zoom) 그리고 카메라가 캐릭터를 따라감 → 스크롤 탐험
  const iw=(curImg&&curImg.naturalWidth)||1381, ih=(curImg&&curImg.naturalHeight)||1139;
  const scale=Math.max(W/iw, H/ih)*(inRoom?CAM_ZOOM_ROOM:CAM_ZOOM);
  const w=iw*scale, h=ih*scale;
  // 카메라(부드럽게 따라오는 camX,camY)가 화면 중앙에 오도록 배경을 반대로 이동
  let x=W/2-camX*w, y=H/2-camY*h;
  // 맵 끝에서는 카메라 clamp(검은 여백 최소화). w>W, h>H 이므로 [W-w,0] 범위
  x=clamp(x, W-w, 0);
  y=clamp(y, H-h, 0);
  bgRect={x:x+shX, y:y+shY, w, h};
}
function s2x(px){return bgRect.x+px*bgRect.w;}
function s2y(py){return bgRect.y+py*bgRect.h;}

let t=0;
function render(){
  if(document.hidden){return;}   // 숨김 탭만 스킵(세로에서도 화면 꽉 렌더)
  t++;
  computeBgRect();
  const f=curScene();
  // 배경
  ctx.fillStyle="#0d0b08"; ctx.fillRect(0,0,W,H);
  if(curImg){
    ctx.drawImage(curImg,bgRect.x,bgRect.y,bgRect.w,bgRect.h);
  }else{
    // placeholder (배경 아직 없음)
    ctx.fillStyle=f.tint+"22"; ctx.fillRect(bgRect.x,bgRect.y,bgRect.w,bgRect.h);
    ctx.fillStyle="#fff"; ctx.textAlign="center"; ctx.font="800 20px var(--font-sans)";
    ctx.fillText(f.name+" 준비 중",W/2,H/2);
  }
  // 핫스팟 마커
  f.spots.forEach(sp=>{
    const x=s2x(sp.x), y=s2y(sp.y);
    const done=(sp.kind==="game"&&isDone(sp.best));
    const isNear=(sp===nearSpot);
    const pulse=1+Math.sin(t*0.08)*0.12;
    // 발판 원
    ctx.beginPath(); ctx.ellipse(x,y+16,26*pulse,12*pulse,0,0,7);
    ctx.fillStyle=(sp.color||"#888")+"55"; ctx.fill();
    ctx.lineWidth=isNear?3:2; ctx.strokeStyle=isNear?"#fff":(sp.color||"#888"); ctx.stroke();
    // 아이콘 버블
    const by=y-30+Math.sin(t*0.06)*3;
    roundRect(x-18,by-18,36,34,9);
    ctx.fillStyle=done?"#fff7e6":"#fffdf7"; ctx.fill();
    ctx.lineWidth=2.5; ctx.strokeStyle=done?"#f6b93b":"#2a2620"; ctx.stroke();
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font="19px var(--font-sans)"; ctx.fillText(sp.icon,x,by-2);
    // 상태 배지
    if(sp.kind==="game"){
      ctx.font="800 11px var(--font-sans)";
      ctx.fillStyle=done?"#c9930a":"#2a2620";
      ctx.fillText(done?"⭐":"▶",x+13,by-24);
    }
    // 삼각 꼬리
    ctx.beginPath(); ctx.moveTo(x-5,by+15);ctx.lineTo(x+5,by+15);ctx.lineTo(x,by+21);ctx.closePath();
    ctx.fillStyle=done?"#fff7e6":"#fffdf7"; ctx.fill(); ctx.strokeStyle=done?"#f6b93b":"#2a2620";ctx.stroke();
  });
  // NPC(안내·보안)
  sceneNPCs().forEach(drawNPC);
  // 캐릭터
  drawPlayer(s2x(player.px), s2y(player.py));
  // 파티클 (juice)
  drawParts();
  drawPops();
  // 페이드
  if(fadeAlpha>0){ ctx.fillStyle="rgba(10,8,5,"+fadeAlpha+")"; ctx.fillRect(0,0,W,H); }
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}
function drawPlayer(x,y){
  const moving=(Math.abs(player.vx)+Math.abs(player.vy))>0.0005;
  const ph=t*0.42;                                     // 걸음 위상
  const bob=moving?Math.abs(Math.sin(ph))*5:0;         // 상하 통통(발 구름)
  const tilt=moving?Math.sin(ph*0.5)*0.07:0;           // 좌우 갸웃(리듬)
  const sq=moving?1+Math.sin(ph)*0.06:1;               // 착지 스쿼시(세로)
  let spr=CHAR[player.dir||"down"];
  // 이동 중이면 걷기 프레임(반대발)과 토글 → 다리 교차 애니
  if(moving){ const ws=CHARWALK[player.dir||"down"]; if(ws&&ws.complete&&ws.naturalWidth&&Math.floor(t/7)%2===1) spr=ws; }
  // 그림자(발 뗄수록 작아짐 → 뜬 느낌)
  const shs=1-bob*0.03;
  ctx.beginPath();ctx.ellipse(x,y+16,18*shs,7*shs,0,0,7);ctx.fillStyle="rgba(0,0,0,.3)";ctx.fill();
  if(spr&&spr.complete&&spr.naturalHeight){
    const h=40, w=spr.naturalWidth*h/spr.naturalHeight;   // 화면 표시 높이(작을수록 공간 넓게)
    ctx.save();
    ctx.translate(x, y+12);
    ctx.rotate(tilt);
    ctx.drawImage(spr, Math.round(-w/2), Math.round(-h-bob), Math.round(w), Math.round(h*sq));
    ctx.restore();
  }
}

const _npcTintCache={};
function tintedSprite(img,tint){
  if(!img||!img.complete||!img.naturalWidth) return null;
  const key=tint+"|"+img.src;
  if(_npcTintCache[key]) return _npcTintCache[key];
  const oc=document.createElement("canvas");
  oc.width=img.naturalWidth; oc.height=img.naturalHeight;
  const octx=oc.getContext("2d");
  octx.drawImage(img,0,0);
  octx.globalCompositeOperation="source-atop";
  octx.fillStyle=tint; octx.globalAlpha=0.5;
  octx.fillRect(0,0,oc.width,oc.height);
  octx.globalAlpha=1; octx.globalCompositeOperation="source-over";
  _npcTintCache[key]=oc;
  return oc;
}
function drawNPC(npc){
  const x=s2x(npc.x), y=s2y(npc.y);
  const seed=npc._seed||(npc._seed=Math.random()*10);
  const moving=npc.type==="security"&&((Math.abs(npc.vx||0)+Math.abs(npc.vy||0))>0.00005);
  const bob=npc.type==="security"
    ? (moving?Math.abs(Math.sin(t*0.30+seed))*4:0)
    : Math.abs(Math.sin(t*0.03+seed))*1.5;   // 안내 NPC = 잔잔한 숨쉬기 bob
  ctx.beginPath();ctx.ellipse(x,y+16,17,7,0,0,7);ctx.fillStyle="rgba(0,0,0,.28)";ctx.fill();
  const ownName = npc.type==="guide" ? GUIDE_SPR[npc.scene] : null;
  const own = ownName ? NPCSPR[ownName] : null;
  if(own && own.complete && own.naturalWidth){
    // 전용 스프라이트(색 틴트·이모지 없음) — 전시실별 과학커뮤니케이터
    const h=44, w=own.naturalWidth*h/own.naturalHeight;
    ctx.drawImage(own, Math.round(x-w/2), Math.round(y+12-h-bob), Math.round(w), Math.round(h));
    // 데스크 스프라이트 제거(2026-07-14): 새 로비 배경에 안내데스크가 이미 그려져 있어 중복 — NPC만 카운터 뒤에 배치
  }else{
    // 폴백: 플레이어 스프라이트 색 틴트 + 이모지 (보안 NPC·전용 로드 실패 시)
    const spr=CHAR[npc.dir||"down"];
    const tint=npc.type==="guide"?"#3a6fd8":"#d83a3a";   // 파랑(안내)/빨강(보안) 유니폼
    const timg=tintedSprite(spr,tint);
    if(timg&&timg.width){
      const h=38, w=timg.width*h/timg.height;
      ctx.drawImage(timg, Math.round(x-w/2), Math.round(y+12-h-bob), Math.round(w), Math.round(h));
    }else{
      ctx.beginPath(); ctx.arc(x,y-10-bob,14,0,7); ctx.fillStyle=tint; ctx.fill();
    }
    ctx.font="15px var(--font-sans)"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(npc.type==="guide"?"🧑‍🏫":"👮", x, y-40-bob);
  }
  if(npc===nearNPC){
    ctx.beginPath(); ctx.ellipse(x,y+16,22,9,0,0,7);
    ctx.lineWidth=2.5; ctx.strokeStyle="#fff"; ctx.stroke();
  }
}

/* ══════════ 페이드 전환 ══════════ */
const FADE_MAX=18; let fadeAlpha=0, fadeState=0; // 0 none,1 out,2 in
let fadeAction=null;
function startFade(action){ if(fadeState)return; fadeState=1; fadeAction=action; }
function updateFade(){
  if(fadeState===1){ fadeAlpha+=1/FADE_MAX; if(fadeAlpha>=1){fadeAlpha=1; if(fadeAction)fadeAction(); fadeState=2;} }
  else if(fadeState===2){ fadeAlpha-=1/FADE_MAX; if(fadeAlpha<=0){fadeAlpha=0; fadeState=0;} }
}

/* ══════════ 이동 업데이트 ══════════ */
const SPEED=0.00225;   // 이동 속도 절반(과학관 넓게 느껴지게)
function update(){
  updateFade();
  updateParts();
  updatePops();
  computeBgRect();   // clamp가 현재 화면 배치를 알아야 함(cover 시 캐릭터 화면이탈 방지)
  if(fadeState){ player.vx=player.vy=0; }
  else{
    // 이동 방향 → 스프라이트 방향
    if(Math.abs(player.vx)>0.0004||Math.abs(player.vy)>0.0004){
      if(Math.abs(player.vx)>Math.abs(player.vy)) player.dir=player.vx>0?"right":"left";
      else player.dir=player.vy>0?"down":"up";
    }
    const sc=curScene(), obs=sc.obstacles;
    // 축별 이동 + 장애물(전시물·벽) 충돌 → 벽 따라 미끄러짐
    const nx=player.px+player.vx; if(!hitObs(obs,nx,player.py)) player.px=nx;
    const ny=player.py+player.vy; if(!hitObs(obs,player.px,ny)) player.py=ny;
    // 걸을 수 있는 영역 경계 clamp. walkable=[x0,y0,x1,y1] 비율
    const wa=sc.walkable;
    if(wa){ player.px=clamp(player.px,wa[0],wa[2]); player.py=clamp(player.py,wa[1],wa[3]); }
    else { player.px=clamp(player.px,0.04,0.96); player.py=clamp(player.py,0.06,0.95); }
  }
  // 근접 핫스팟 (확대된 맵 기준이라 화면상 100px 이내를 근접으로)
  let best=null,bd=1e9;
  const f=curScene();
  f.spots.forEach(sp=>{
    const dx=(sp.x-player.px)*bgRect.w, dy=(sp.y-player.py)*bgRect.h;
    const d=Math.hypot(dx,dy);
    if(d<135&&d<bd){bd=d;best=sp;}
  });
  if(best!==nearSpot){ nearSpot=best; updateFloorTag(); updateAbtn(); }
  // NPC: 보안 순찰 이동 + 근접 감지(nearSpot과 별개, 공존)
  updateNPCs();
  updateNearNPC();
  // 카메라 부드럽게 따라옴(공간감)
  camX+=(player.px-camX)*0.11; camY+=(player.py-camY)*0.11;
  // 화면 흔들림 감쇠
  if(shake>0.3){ shake*=0.85; shX=(Math.random()-0.5)*shake; shY=(Math.random()-0.5)*shake; }
  else { shake=0; shX=shY=0; }
}
function updateAbtn(){
  const a=document.getElementById("abtn"), lb=document.getElementById("alabel"), ic=a.querySelector(".ai");
  if(nearNPC){
    a.classList.add("on"); ic.textContent=nearNPC.type==="guide"?"🧑‍🏫":"👮"; lb.textContent="대화";
  }else if(nearSpot){
    a.classList.add("on");
    if(nearSpot.kind==="elevator"){ic.textContent="🛗";lb.textContent="층 이동";}
    else if(nearSpot.kind==="stair"){ic.textContent="🪜";lb.textContent="계단";}
    else if(nearSpot.kind==="gate"){ic.textContent=nearSpot.icon||"🚪";lb.textContent=nearSpot.label||"이동";}
    else if(nearSpot.kind==="game"){ic.textContent="🎮";lb.textContent="플레이";}
    else if(nearSpot.kind==="door"){ic.textContent="🚪";lb.textContent="입장";}
    else if(nearSpot.kind==="exit"){ic.textContent="🚪";lb.textContent="나가기";}
    else{ic.textContent="🔍";lb.textContent="살펴보기";}
  }else{ a.classList.remove("on"); ic.textContent="🚪"; lb.textContent="입장"; }
}

/* ══════════ 조작: 조이스틱 (Pointer Events + pointerId 추적 → 멀티터치 안전) ══════════ */
(function(){
  const stick=document.getElementById("stick"), nub=document.getElementById("nub");
  let pid=null, cx=0, cy=0, R=44;   // pid=이 조이스틱을 잡은 포인터만 처리
  function start(e){
    if(pid!==null)return;           // 이미 다른 손가락이 조이스틱 잡음
    pid=e.pointerId;
    const r=stick.getBoundingClientRect(); cx=r.left+r.width/2; cy=r.top+r.height/2;
    try{stick.setPointerCapture(pid);}catch(_){}
    move(e);
  }
  function move(e){
    if(e.pointerId!==pid)return; e.preventDefault();
    let dx=e.clientX-cx, dy=e.clientY-cy;
    const d=Math.hypot(dx,dy); if(d>R){dx=dx/d*R; dy=dy/d*R;}
    nub.style.transform="translate("+dx+"px,"+dy+"px)";
    player.vx=dx/R*SPEED; player.vy=dy/R*SPEED;
  }
  function end(e){
    if(e.pointerId!==pid)return;
    pid=null; nub.style.transform=""; player.vx=player.vy=0;
  }
  stick.addEventListener("pointerdown",start);
  stick.addEventListener("pointermove",move);
  stick.addEventListener("pointerup",end);
  stick.addEventListener("pointercancel",end);
  // 키보드(테스트)
  const keys={};
  window.addEventListener("keydown",e=>{keys[e.key]=1;applyKeys();});
  window.addEventListener("keyup",e=>{keys[e.key]=0;applyKeys();});
  function applyKeys(){
    let vx=0,vy=0;
    if(keys.ArrowLeft||keys.a)vx-=1; if(keys.ArrowRight||keys.d)vx+=1;
    if(keys.ArrowUp||keys.w)vy-=1; if(keys.ArrowDown||keys.s)vy+=1;
    const d=Math.hypot(vx,vy)||1; player.vx=vx/d*SPEED*(vx||vy?1:0); player.vy=vy/d*SPEED*(vx||vy?1:0);
    if(!vx&&!vy){player.vx=player.vy=0;}
  }
})();

function openElevator(sp){
  // 지도 모달 재활용: 이 엘베가 정차하는 층만
  const m=document.getElementById("map");
  document.querySelector("#map h2").textContent="🛗 "+((sp&&sp.name)||"엘리베이터");
  document.querySelector("#map .sub").textContent="이동할 층을 선택하세요";
  const body=document.getElementById("mapBody");
  body.innerHTML="";
  const order=(sp&&sp.floors)?sp.floors:FLOORS.map(f=>f.id);   // 엘베가 정한 층 순서(위→아래)로 표시
  order.forEach(fid=>{
    const i=FLOORS.findIndex(f=>f.id===fid); if(i<0)return;
    const f=FLOORS[i];
    const row=document.createElement("div"); row.className="map-floor";
    row.style.cursor="pointer";
    row.innerHTML='<h3>'+(i===floorIdx?"📍 ":"")+f.name+'</h3>';
    row.onclick=()=>{ closeModals(); if(i!==floorIdx){startFade(()=>enterFloor(i));} };
    body.appendChild(row);
  });
  m.classList.add("show");
}

/* ══════════ 스탬프 판정 ══════════ */
function refreshDone(){ doneCache={}; STAMPS.forEach(s=>{doneCache[s.key]=(+(safeGet(s.key)||0)>0);}); }
function isDone(key){ return !!doneCache[key]; }
function got(s){ return isDone(s.key); }
function gotCount(){ return STAMPS.filter(got).length; }

/* ══════════ 도감·점수 (수집 가시화 = 박물관 게임 1순위) ══════════ */
const ALL_EXHIBITS=[]; Object.values(ROOMS).forEach(r=>r.spots.forEach(s=>{
  if(s.kind==="exhibit")ALL_EXHIBITS.push({room:r.name,name:s.name,icon:s.icon,info:s.info});}));
const EXHIBIT_TOTAL=ALL_EXHIBITS.length;
function seenMap(){ try{const o=JSON.parse(safeGet("ssc_seen")||"{}"); return (o&&typeof o==="object"&&!Array.isArray(o))?o:{};}catch(e){return {};} }
function isSeen(name){ return !!seenMap()[name]; }
function seenCount(){ const s=seenMap(); return ALL_EXHIBITS.filter(e=>s[e.name]).length; }
function markSeen(name){ const s=seenMap(); if(!s[name]){ s[name]=1; safeSet("ssc_seen",JSON.stringify(s)); popScore("+5 관람"); } }
function getScore(){ return gotCount()*10 + seenCount()*5; }   // 스탬프 10점 · 전시물 5점
function updateScore(){
  const el=document.getElementById("sc"); if(el)el.textContent=gotCount();
  const sv=document.getElementById("scoreVal"); if(sv)sv.textContent=getScore();
}
function getBadges(){
  const b=[];
  if(gotCount()>=STAMP_TOTAL) b.push({icon:"🥇",name:"스탬프 마스터"});
  if(EXHIBIT_TOTAL>0&&seenCount()>=EXHIBIT_TOTAL) b.push({icon:"👀",name:"관람왕"});
  if(gotCount()>=3) b.push({icon:"🎮",name:"게이머"});
  if(EXHIBIT_TOTAL>0&&seenCount()>=Math.ceil(EXHIBIT_TOTAL/2)) b.push({icon:"🔎",name:"호기심 탐험가"});
  if(getScore()>=100) b.push({icon:"💯",name:"100점 돌파"});
  return b;
}

/* ══════════ 게임 복귀 축하 ══════════ */
function checkNewStamps(){
  refreshDone(); updateScore();
  let seen={}; try{seen=JSON.parse(safeGet("ufo_seen")||"{}");}catch(e){}
  if(!seen||typeof seen!=="object"||Array.isArray(seen))seen={};   // "null"·배열 등 방어
  const fresh=STAMPS.filter(s=>got(s)&&!seen[s.id]);
  if(fresh.length===0) return;
  const s=fresh[0]; seen[s.id]=1; safeSet("ufo_seen",JSON.stringify(seen));
  sfxChord([523,659,784,1047]);        // 도미솔도 상승 = 획득 축하음
  const cx=(bgRect.w?s2x(player.px):W/2), cy=(bgRect.h?s2y(player.py):H/2);
  burst(cx,cy,"#f6b93b",26); burst(cx,cy,"#4a90e2",14); shake=14;
  document.getElementById("cheerIcon").textContent=s.icon;
  document.getElementById("cheerRoom").textContent=s.floor+" · "+s.room+" — "+s.label;
  document.getElementById("cheer").classList.add("show");
}

  if(gotCount()>=STAMP_TOTAL){ setTimeout(showCert,300); }
  else setTimeout(checkNewStamps,250);

    el.style.display="flex";
  }
  window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); dp=e; if(!safeGet("a2hs_seen"))show("install"); });
  document.getElementById("a2hsBtn").onclick=async()=>{ if(dp){dp.prompt();dp=null;} el.style.display="none"; };
  document.getElementById("a2hsX").onclick=()=>{ el.style.display="none"; safeSet("a2hs_seen","1"); };
  if(isIOS && !standalone && !safeGet("a2hs_seen")) setTimeout(()=>show("ios"),1800);
})();

refreshDone(); updateScore();
preload();
console.log("과학관 탐방 "+HUB_VERSION+" · 스탬프 "+STAMP_TOTAL+"개");
</script>
</body>
</html>
