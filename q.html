<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>지진 대피 훈련 — 지진체험관</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c1024; --bg2:#141833; --line:#2b3158;
    --ink:#f2f4ff; --muted:#9aa3cf;
    --amber:#ffcc33; --amber-d:#d9a915;
    --red:#ff4757; --orange:#ff9a3c;
    --num:"Baloo 2","Pretendard",sans-serif;
    --kr:"Pretendard",-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;word-break:keep-all;overflow-wrap:break-word;overflow:hidden}
  /* position:fixed = 모바일 스크롤/바운스 완전 잠금 */
  body{background:var(--bg);color:var(--ink);font-family:var(--kr);
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    position:fixed;inset:0;height:100dvh;
    padding:calc(8px + env(safe-area-inset-top)) 8px calc(10px + env(safe-area-inset-bottom));gap:7px;
    user-select:none;-webkit-user-select:none;touch-action:none}

  .backBtn{position:fixed;left:calc(8px + env(safe-area-inset-left));top:calc(8px + env(safe-area-inset-top));
    z-index:30;background:var(--bg2);border:1.5px solid var(--line);color:var(--muted);
    border-radius:11px;height:32px;padding:0 12px;font-size:12.5px;font-weight:700;
    cursor:pointer;font-family:var(--kr);text-decoration:none;display:flex;align-items:center;gap:4px}

  .hud{width:min(94vw,430px,calc((100dvh - 195px)*0.706));display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:36px}
  .score-box{display:flex;align-items:baseline;gap:8px}
  .score{font-family:var(--num);font-weight:800;font-size:30px;line-height:1;color:var(--ink)}
  .best{font-family:var(--num);font-weight:600;font-size:13px;color:var(--muted)}
  .btn-ic{background:var(--bg2);border:1.5px solid var(--line);color:var(--muted);
    border-radius:12px;height:38px;padding:0 12px;font-size:13px;font-weight:700;
    cursor:pointer;font-family:var(--kr);white-space:nowrap}
  .timer{font-family:var(--num);font-weight:800;font-size:26px;line-height:1;
    background:var(--bg2);border:1.5px solid var(--line);border-radius:12px;
    padding:6px 14px;color:var(--ink);min-width:64px;text-align:center}
  .timer.low{color:var(--red);border-color:var(--red);animation:pulse .5s infinite alternate}
  @keyframes pulse{from{transform:scale(1)}to{transform:scale(1.1)}}

  /* 하트 + 음소거 줄 */
  .subhud{width:min(94vw,430px,calc((100dvh - 195px)*0.706));display:flex;justify-content:space-between;align-items:center;
    gap:8px;background:var(--bg2);border:1.5px solid var(--line);border-radius:14px;padding:8px 12px}
  .hearts{display:flex;gap:6px}
  .heart{font-size:19px;line-height:1;color:var(--line);transition:color .2s,transform .2s}
  .heart.filled{color:var(--red)}

  .stage{position:relative}
  canvas#game{display:block;background:radial-gradient(ellipse at 50% 0%, #171c3d 0%, var(--bg) 62%);
    border:2px solid var(--line);border-radius:18px;width:min(94vw,430px,calc((100dvh - 195px)*0.706));height:auto;touch-action:none}

  /* 팩트 토스트 */
  .toast{position:absolute;left:50%;bottom:14px;transform:translateX(-50%) translateY(90px);
    width:calc(100% - 28px);max-width:390px;background:rgba(20,24,50,.94);
    border:1.5px solid var(--amber);border-radius:14px;padding:11px 14px;
    display:flex;gap:11px;align-items:center;opacity:0;visibility:hidden;
    transition:transform .35s cubic-bezier(.2,.9,.3,1.2),opacity .3s,visibility .3s;
    pointer-events:none;z-index:5}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible}
  .toast .dot{width:34px;height:34px;border-radius:50%;flex-shrink:0}
  .toast b{font-size:13.5px;display:block;color:var(--amber)}
  .toast p{font-size:12.5px;color:#d9def5;line-height:1.45;margin-top:1px}

  /* 오버레이 */
  .ov{position:fixed;inset:0;background:rgba(9,11,26,.86);backdrop-filter:blur(5px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:28px;z-index:20;transition:opacity .25s;overflow-y:auto}
  .ov.hide{opacity:0;pointer-events:none}
  .ov h1{font-size:27px;font-weight:900;letter-spacing:-.02em;line-height:1.35}
  .ov h1 em{font-style:normal;color:var(--amber)}
  .ov .sub{font-size:12.5px;color:var(--muted);margin-top:10px}
  .go{margin-top:22px;font-family:var(--kr);font-weight:800;font-size:17px;
    background:var(--amber);color:#2a1e04;border:none;border-radius:16px;
    padding:15px 44px;cursor:pointer;box-shadow:0 5px 0 var(--amber-d);transition:transform .08s}
  .go:active{transform:translateY(4px);box-shadow:0 1px 0 var(--amber-d)}
  .howto{display:flex;align-items:center;gap:8px;margin:20px 0 6px;flex-wrap:wrap;justify-content:center}
  .step{background:var(--bg2);border:1.5px solid var(--line);border-radius:14px;
    padding:12px 10px;width:100px}
  .step-ic{font-size:24px;margin-bottom:6px}
  .step p{font-size:11.5px;color:#d9def5;line-height:1.45}
  .step p b{color:var(--amber)}
  .step-arrow{color:var(--muted);font-size:15px;font-weight:800}
  .hint{margin-top:6px;font-size:11.5px;color:var(--muted)}
  .backlink{margin-top:16px;font-size:13px;color:var(--muted);text-decoration:none}
  @media (max-height:760px){
    .ov h1{font-size:21px}
    .howto{margin:12px 0 4px}
    .step{padding:9px 8px;width:90px}
    .step-ic{font-size:20px;margin-bottom:4px}
    .go{margin-top:14px;padding:12px 38px}
    .ov .sub{margin-top:5px}
  }
  .ov .final-score{font-family:var(--num);font-weight:800;font-size:52px;color:var(--amber);line-height:1.1}
  .ov .final-label{font-size:13px;color:var(--muted);letter-spacing:.08em}
  .ov .final-grade{margin-top:8px;font-family:var(--num);font-weight:800;font-size:20px;color:var(--ink)}
  .ov .final-max{margin-top:10px;font-size:14.5px;color:#d9def5}
</style>
</head>
<body>

<a class="backBtn" href="h.html">← 허브</a>

<div class="hud">
  <div class="score-box"><div class="score" id="score">0</div><div class="best" id="best">최고 0</div></div>
  <div class="timer" id="timer">90</div>
  <button class="btn-ic" id="muteBtn" aria-label="효과음 켜기/끄기">🔊 소리</button>
</div>
<div class="subhud">
  <div class="hearts" id="hearts"></div>
  <span style="font-size:11.5px;color:var(--muted)">경보가 뜨면 옆 레인으로!</span>
</div>
<div class="stage">
  <canvas id="game"></canvas>
  <div class="toast" id="toast"><div class="dot" id="toastDot"></div><div><b id="toastTitle"></b><p id="toastBody"></p></div></div>
</div>

<div class="ov" id="intro">
  <h1>지진 대피 훈련<br><em>흔들리기 전, 그 몇 초</em></h1>
  <div class="howto">
    <div class="step"><div class="step-ic">⚠️</div><p><b>노란 경보</b>가<br>깜빡이면</p></div>
    <div class="step-arrow">→</div>
    <div class="step"><div class="step-ic">🏃</div><p><b>옆 레인</b>으로<br>피하고</p></div>
    <div class="step-arrow">→</div>
    <div class="step"><div class="step-ic">⏱</div><p><b>90초</b> 동안<br>생존!</p></div>
  </div>
  <p class="hint">화면 좌/우 탭 또는 ← → 키로 이동</p>
  <p class="sub">경보와 흔들림 사이, 그 짧은 틈이 지진 조기경보의 원리예요</p>
  <button class="go" id="startBtn">훈련 시작</button>
</div>

<div class="ov hide" id="over">
  <div class="final-label" id="overTitle">훈련 종료!</div>
  <div class="final-score" id="finalScore">0</div>
  <div class="final-grade" id="finalGrade"></div>
  <div class="final-max" id="finalMax"></div>
  <button class="go" id="retryBtn">다시 도전</button>
  <a href="h.html" class="backlink">🏛 과학관 허브로 돌아가기</a>
</div>

<script>
"use strict";

// ===== 상수 =====
const VERSION="v1.0";
const W=480,H=680;
const LANES=3, LANE_W=W/LANES;
const LANE_X=[LANE_W*0.5,LANE_W*1.5,LANE_W*2.5];
const TOP_Y=150, FLOOR_Y=H-90, FLOOR_TOP=H-130; // 낙하 시작선 / 착지선 / 바닥대 상단
const TIME_LIMIT=90;
const WARN_TIME=900;      // P파 예고 시간(ms)
const FALL_TIME=500;      // 경보 종료 후 물체가 떨어지는 시간(ms) — 항상 고정, 조기경보 원리를 유지하기 위해
const START_HEARTS=3;
const MAX_COMBO_MULT=8;
const FACTS=[
  {c:"#ffd24a",t:"P파가 먼저 와요",b:"P파는 초속 약 6~8km, S파는 약 3~4km로 P파가 훨씬 빨라요. 그래서 흔들림보다 경보가 먼저 도착해요."},
  {c:"#ff9a3c",t:"이게 지진 조기경보예요",b:"P파와 S파의 속도 차이 덕분에, 진짜 흔들림(S파)이 오기 전 몇 초의 여유가 생겨요. 그 틈에 대피하는 거예요."},
  {c:"#ff4757",t:"몸을 낮추고 머리를 보호해요",b:"지진이 나면 책상 아래로 들어가 다리를 잡고, 머리와 목을 보호하는 게 먼저예요."}
];

// ===== 상태 =====
let started=false, overFlag=false, muted=false;
let score=0, best=+(localStorage.getItem("quake_best")||0);
let hearts=START_HEARTS, combo=0, timeLeft=TIME_LIMIT;
let playerLane=1, visualX=LANE_X[1];
let shake=0, flashRed=0, floats=[];
let events=[];           // 진행 중인 경보/낙하 이벤트
let nextSpawnAt=0;
let factsShown=new Set();
let pointerDownFlag=false;

// 페이지 밀림 방지
addEventListener("load",()=>scrollTo(0,0));
addEventListener("resize",()=>scrollTo(0,0));

// ===== 레이아웃 실측 맞춤 (m.html v1.1 fitLayout 이식) =====
function fitLayout(){
  const hud=document.querySelector(".hud"),sub=document.querySelector(".subhud"),cvEl=document.getElementById("game");
  if(!hud||!sub||!cvEl)return;
  for(let pass=0;pass<2;pass++){
    const bs=getComputedStyle(document.body);
    const padV=parseFloat(bs.paddingTop)+parseFloat(bs.paddingBottom);
    const availH=window.innerHeight-hud.offsetHeight-sub.offsetHeight-padV-14-4-8-36; /* 36 = .hud margin-top(뒤로 버튼 회피) */
    const w=Math.min(window.innerWidth*0.94,430,Math.max(220,availH*0.706));
    const wpx=Math.round(w)+"px";
    hud.style.width=wpx;sub.style.width=wpx;cvEl.style.width=wpx;
  }
}
addEventListener("resize",fitLayout);
addEventListener("orientationchange",()=>setTimeout(fitLayout,120));
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(fitLayout);
addEventListener("load",fitLayout);
fitLayout();

// ===== 캔버스 =====
const cv=document.getElementById("game"),ctx=cv.getContext("2d");
const DPR=Math.min(window.devicePixelRatio||1,2);
cv.width=W*DPR; cv.height=H*DPR;

// ===== 사운드 (WebAudio 합성 — 에셋 0개) =====
let AC=null;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function beep(f0,f1,dur,type,vol){
  if(muted)return; const a=ac(); if(!a)return;
  const o=a.createOscillator(),g=a.createGain();
  o.type=type||"sine"; o.frequency.setValueAtTime(f0,a.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),a.currentTime+dur);
  g.gain.setValueAtTime(vol||.15,a.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,a.currentTime+dur);
  o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+dur);
}
const sWarn=()=>beep(880,860,.11,"square",.13);
const sMove=()=>beep(500,340,.05,"sine",.05);
const sAvoid=(c)=>beep(460+Math.min(c,10)*24,880,.13,"triangle",.14);
const sHit=()=>beep(190,45,.35,"sawtooth",.19);
const sBonus=()=>beep(320,1200,.6,"triangle",.15);
const sOver=()=>beep(400,80,.7,"sawtooth",.1);

// ===== 낙하물 종류 (플랫 2톤) =====
const OBJ_TYPES=["book","plant","bulb"];

function drawFallObject(x,y,type,scale){
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);
  if(type==="book"){
    ctx.fillStyle="#8a5a34";ctx.fillRect(-24,-16,48,32);
    ctx.fillStyle="#6b4326";ctx.fillRect(-24,10,48,6);
    ctx.fillStyle="#e0a35a";
    ctx.fillRect(-17,-9,10,20);ctx.fillRect(-2,-9,10,20);ctx.fillRect(13,-9,8,20);
  } else if(type==="plant"){
    ctx.fillStyle="#b06a3c";ctx.beginPath();ctx.moveTo(-16,10);ctx.lineTo(16,10);ctx.lineTo(12,26);ctx.lineTo(-12,26);ctx.closePath();ctx.fill();
    ctx.fillStyle="#4a9a5a";
    ctx.beginPath();ctx.ellipse(-6,-8,13,7,0.6,0,6.283);ctx.fill();
    ctx.beginPath();ctx.ellipse(8,-4,13,7,-0.5,0,6.283);ctx.fill();
    ctx.beginPath();ctx.ellipse(0,-18,11,6,0.1,0,6.283);ctx.fill();
  } else { // bulb
    ctx.fillStyle="#e8c96a";ctx.beginPath();ctx.arc(0,-4,17,0,6.283);ctx.fill();
    ctx.fillStyle="#c7a83f";ctx.fillRect(-7,10,14,10);
    ctx.strokeStyle="rgba(255,255,255,.7)";ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(-5,-9,5,0,6.283);ctx.stroke();
  }
  ctx.restore();
}

// ===== 플레이어 캐릭터 (플랫 2톤 + 얼굴, m.html 톤 이식) =====
function drawPlayer(x,y){
  ctx.save();ctx.translate(x,y);
  // 그림자
  ctx.fillStyle="rgba(0,0,0,.28)";ctx.beginPath();ctx.ellipse(0,34,26,7,0,0,6.283);ctx.fill();
  // 몸통 (주황 우주복)
  ctx.fillStyle="#ff9a3c";
  ctx.beginPath();
  ctx.moveTo(-20,30);ctx.lineTo(-22,-4);ctx.quadraticCurveTo(-22,-18,0,-18);
  ctx.quadraticCurveTo(22,-18,22,-4);ctx.lineTo(20,30);ctx.closePath();ctx.fill();
  ctx.fillStyle="#e07f22";
  ctx.beginPath();ctx.moveTo(2,-14);ctx.lineTo(20,-2);ctx.lineTo(18,30);ctx.lineTo(4,30);ctx.closePath();ctx.fill();
  // 다리
  ctx.fillStyle="#e0703f";
  ctx.fillRect(-16,28,12,14);ctx.fillRect(4,28,12,14);
  // 헬멧
  ctx.fillStyle="#d9def5";ctx.beginPath();ctx.arc(0,-24,17,0,6.283);ctx.fill();
  ctx.fillStyle="#aeb6e0";ctx.beginPath();ctx.arc(4,-21,15,0,6.283);ctx.fill();
  ctx.fillStyle="#d9def5";ctx.beginPath();ctx.arc(-3,-27,12,0,6.283);ctx.fill();
  // 얼굴
  ctx.fillStyle="#2a2e4a";
  ctx.beginPath();ctx.arc(-6,-25,2.4,0,6.283);ctx.fill();
  ctx.beginPath();ctx.arc(3,-25,2.4,0,6.283);ctx.fill();
  ctx.strokeStyle="#2a2e4a";ctx.lineWidth=2;ctx.lineCap="round";
  ctx.beginPath();ctx.arc(-1.5,-20,3.4,0.15*Math.PI,0.85*Math.PI);ctx.stroke();
  ctx.restore();
}

// ===== 이벤트(경보→낙하) 스케줄링 =====
function scheduleNext(now){
  const progress=Math.min(1,(TIME_LIMIT-timeLeft)/TIME_LIMIT);
  const interval=2200-progress*1250+(Math.random()*300-150);
  nextSpawnAt=now+Math.max(650,interval);
}
function spawnEvent(now){
  const progress=Math.min(1,(TIME_LIMIT-timeLeft)/TIME_LIMIT);
  const doubleChance=progress>0.28?Math.min(0.45,(progress-0.28)*0.7):0;
  let lanes;
  if(Math.random()<doubleChance){
    const a=Math.floor(Math.random()*LANES);
    let b=Math.floor(Math.random()*LANES);
    while(b===a)b=Math.floor(Math.random()*LANES);
    lanes=[a,b];
  } else {
    lanes=[Math.floor(Math.random()*LANES)];
  }
  const type=OBJ_TYPES[Math.floor(Math.random()*OBJ_TYPES.length)];
  events.push({
    lanes, type,
    warnStart:now, fallStart:now+WARN_TIME, landTime:now+WARN_TIME+FALL_TIME,
    beeped1:false, beeped2:false, resolved:false
  });
}

// ===== 판정 =====
function onHit(){
  hearts=Math.max(0,hearts-1); combo=0; shake=13; flashRed=1;
  sHit(); renderHearts();
  if(hearts<=0) gameOver(false);
}
function onAvoid(x,y){
  combo++;
  const mult=Math.min(MAX_COMBO_MULT,combo);
  const v=100*mult;
  score+=v;
  document.getElementById("score").textContent=score;
  if(score>best){best=score;localStorage.setItem("quake_best",best);
    document.getElementById("best").textContent="최고 "+best;}
  floats.push({x,y,txt:`+${v}`,life:1,big:combo>1});
  if(combo>1)floats.push({x,y:y-26,txt:`x${mult} 콤보`,life:1.2,big:true});
  sAvoid(combo);
  if([5,10,15].includes(combo) && !factsShown.has(combo)){
    factsShown.add(combo);
    const f=FACTS[[5,10,15].indexOf(combo)];
    showToast(f.c,f.t,f.b);
  }
}

// ===== 렌더 헬퍼 =====
function renderHearts(){
  const el=document.getElementById("hearts");el.innerHTML="";
  for(let i=0;i<START_HEARTS;i++){
    const s=document.createElement("span");
    s.className="heart"+(i<hearts?" filled":"");
    s.textContent="♥";
    el.appendChild(s);
  }
}
let toastTimer=null;
function showToast(color,title,body){
  const el=document.getElementById("toast");
  document.getElementById("toastDot").style.background=color;
  document.getElementById("toastTitle").textContent=title;
  document.getElementById("toastBody").textContent=body;
  el.classList.add("show");
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("show"),3400);
}

// ===== 등급 =====
function grade(finalScore){
  if(finalScore>=7000)return"S · 대피 마스터";
  if(finalScore>=3500)return"A · 침착한 대피자";
  if(finalScore>=1500)return"B · 훈련된 시민";
  return"C · 대피 초보";
}

// ===== 게임 흐름 =====
function reset(){
  events.length=0;floats.length=0;
  score=0;combo=0;hearts=START_HEARTS;timeLeft=TIME_LIMIT;
  playerLane=1;visualX=LANE_X[1];
  shake=0;flashRed=0;overFlag=false;factsShown=new Set();
  document.getElementById("score").textContent="0";
  document.getElementById("timer").textContent=TIME_LIMIT;
  document.getElementById("timer").classList.remove("low");
  renderHearts();
  nextSpawnAt=performance.now()+1500;
}
function gameOver(byTime){
  overFlag=true;sOver();
  document.getElementById("overTitle").textContent=byTime?"⏱ 90초 생존 성공!":"💥 대피 실패!";
  const finalScore=score;
  document.getElementById("finalGrade").textContent=grade(finalScore);
  document.getElementById("finalMax").textContent=byTime?"보너스 +1000점 포함!":"경보가 뜨면 바로 옆 레인으로 피해보세요.";
  document.getElementById("over").classList.remove("hide");
  // 점수 카운트업
  const el=document.getElementById("finalScore");
  const t0=performance.now(),dur=700;
  (function tick(now){
    const p=Math.min(1,(now-t0)/dur);
    el.textContent=Math.round(finalScore*(1-Math.pow(1-p,3)));
    if(p<1)requestAnimationFrame(tick);
  })(t0);
}

// ===== 입력 =====
function moveLane(dir){
  if(!started||overFlag)return;
  const nl=Math.max(0,Math.min(LANES-1,playerLane+dir));
  if(nl!==playerLane){playerLane=nl;sMove();}
}
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft"){e.preventDefault();ac()&&AC.resume&&AC.resume();moveLane(-1);}
  else if(e.key==="ArrowRight"){e.preventDefault();ac()&&AC.resume&&AC.resume();moveLane(1);}
});
cv.addEventListener("pointerdown",e=>{
  e.preventDefault();ac()&&AC.resume&&AC.resume();
  if(!started||overFlag)return;
  pointerDownFlag=true;
  const r=cv.getBoundingClientRect();
  const x=e.clientX-r.left;
  moveLane(x<r.width/2?-1:1);
});
cv.addEventListener("pointerup",()=>pointerDownFlag=false);
cv.addEventListener("pointercancel",()=>pointerDownFlag=false);

// ===== 메인 루프 =====
let lastT=performance.now();
function frame(now){
  const dt=Math.min((now-lastT)/1000,.05);lastT=now;

  if(started&&!overFlag){
    // 타이머
    timeLeft-=dt;
    const tl=Math.max(0,Math.ceil(timeLeft)),tEl=document.getElementById("timer");
    tEl.textContent=tl;
    tEl.classList.toggle("low",timeLeft<=10);
    if(timeLeft<=0){
      score+=1000;
      document.getElementById("score").textContent=score;
      if(score>best){best=score;localStorage.setItem("quake_best",best);
        document.getElementById("best").textContent="최고 "+best;}
      sBonus();
      gameOver(true);
    }
    // 스폰
    if(!overFlag && now>=nextSpawnAt){ spawnEvent(now); scheduleNext(now); }
    // 이벤트 처리
    for(const ev of events){
      if(ev.resolved)continue;
      if(now<ev.fallStart){
        // 경보(P파) 단계 — 삐삐 2회
        const t=now-ev.warnStart;
        if(!ev.beeped1 && t>=0){ev.beeped1=true;sWarn();}
        if(!ev.beeped2 && t>=420){ev.beeped2=true;sWarn();}
      } else if(now>=ev.landTime){
        // 착지(S파 도달) — 판정
        ev.resolved=true;
        for(const lane of ev.lanes){
          const x=LANE_X[lane];
          if(lane===playerLane) onHit();
          else onAvoid(x,FLOOR_Y-10);
          if(overFlag)break; // 게임오버 직후엔 같은 이벤트의 남은 레인을 더 판정하지 않음
        }
      }
    }
    events=events.filter(e=>!e.resolved);
  }

  // 플레이어 시각 위치 보간
  const targetX=LANE_X[playerLane];
  visualX+=(targetX-visualX)*Math.min(1,dt*12);

  // ===== 드로잉 =====
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  if(shake>0){ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);shake*=.85;if(shake<.4)shake=0;}

  // 배경 격자(레인 구분선)
  ctx.strokeStyle="rgba(154,163,207,.16)";ctx.lineWidth=2;
  for(let i=1;i<LANES;i++){
    ctx.beginPath();ctx.moveTo(LANE_W*i,TOP_Y);ctx.lineTo(LANE_W*i,H);ctx.stroke();
  }
  // 바닥대
  ctx.fillStyle="#171c3d";ctx.fillRect(0,FLOOR_TOP,W,H-FLOOR_TOP);
  ctx.strokeStyle="rgba(154,163,207,.25)";ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,FLOOR_TOP);ctx.lineTo(W,FLOOR_TOP);ctx.stroke();

  // 레인별 경보 플래시 + 낙하물
  for(const ev of events){
    const warnPulse=0.35+Math.sin(now/60)*0.25;
    if(now<ev.fallStart){
      for(const lane of ev.lanes){
        ctx.fillStyle=`rgba(255,204,51,${Math.max(0,warnPulse)})`;
        ctx.fillRect(LANE_W*lane+4,FLOOR_TOP,LANE_W-8,H-FLOOR_TOP);
      }
    } else if(now<ev.landTime){
      const p=(now-ev.fallStart)/FALL_TIME;
      const y=TOP_Y+(FLOOR_Y-TOP_Y)*p;
      for(const lane of ev.lanes){
        drawFallObject(LANE_X[lane],y,ev.type,0.9+p*0.25);
      }
    }
  }

  // 플레이어
  drawPlayer(visualX,FLOOR_Y+4);

  // 파티클성 점수 플로팅
  for(let i=floats.length-1;i>=0;i--){const f=floats[i];
    f.y-=dt*46;f.life-=dt*1.1;
    if(f.life<=0){floats.splice(i,1);continue;}
    ctx.globalAlpha=Math.min(f.life,1);
    ctx.font=(f.big?"800 20px":"600 15px")+" 'Baloo 2',sans-serif";
    ctx.fillStyle=f.big?"#ffcc33":"#f2f4ff";ctx.textAlign="center";
    ctx.fillText(f.txt,f.x,f.y);}
  ctx.globalAlpha=1;

  // 피격 레드 플래시
  if(flashRed>0){
    ctx.fillStyle=`rgba(255,71,87,${flashRed*0.35})`;
    ctx.fillRect(0,0,W,H);
    flashRed=Math.max(0,flashRed-dt*3);
  }

  requestAnimationFrame(frame);
}

// ===== 시작 =====
document.getElementById("best").textContent="최고 "+best;
renderHearts();
const vTag=document.createElement("div");
vTag.textContent=VERSION;
vTag.style.cssText="position:fixed;right:8px;bottom:6px;font-size:10px;color:#4a5180;font-family:var(--num);z-index:50";
document.body.appendChild(vTag);

document.getElementById("muteBtn").onclick=function(){muted=!muted;this.textContent=muted?"🔇 무음":"🔊 소리";};
document.getElementById("startBtn").onclick=()=>{
  ac()&&AC.resume&&AC.resume();
  document.getElementById("intro").classList.add("hide");
  started=true;reset();
};
document.getElementById("retryBtn").onclick=()=>{
  document.getElementById("over").classList.add("hide");reset();
};
requestAnimationFrame(frame);
</script>
</body>
</html>
